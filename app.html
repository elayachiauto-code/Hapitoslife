<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --g:#059652;--g2:#047A42;--g3:#E8F7EF;
  --ink:#0D1B2A;--sub:#4A5568;--line:#E2E8F0;
  --bg:#FFFFFF;--bg2:#F8FAFC;
  --orange:#E85D2F;--gold:#D4970A;
  --sans:'Tahoma','Segoe UI',Arial,sans-serif;
  --serif:'Georgia',serif;
}
html,body{height:100%;overflow-x:hidden;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.6;}
img{display:block;max-width:100%;}
a{text-decoration:none;}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}

/* ── LANG BAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;
  background:rgba(255,255,255,.95);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
  box-shadow:0 1px 12px rgba(0,0,0,.06);
}
.topbar-brand{font-size:.7rem;font-weight:900;color:var(--g);letter-spacing:2px;text-transform:uppercase;}
.lang-btns{display:flex;gap:4px;}
.lb{padding:4px 10px;border-radius:16px;border:1px solid var(--line);background:none;color:var(--sub);font-size:.68rem;font-weight:700;cursor:pointer;transition:.15s;}
.lb.on{background:var(--g);color:#fff;border-color:var(--g);}

/* ── WELCOME ── */
#welcome{position:relative;overflow:hidden;}
.wlc-hero{
  min-height:100vh;position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:80px 24px 40px;
}
.wlc-bg{
  position:absolute;inset:0;
  background:url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1200&q=80') center/cover no-repeat;
}
.wlc-bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(160deg,rgba(5,150,82,.9) 0%,rgba(4,50,25,.82) 100%);
}
.wlc-inner{position:relative;z-index:2;max-width:380px;}
.wlc-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:#fff;font-size:.68rem;font-weight:800;letter-spacing:2px;
  padding:5px 14px;border-radius:30px;margin-bottom:20px;
  text-transform:uppercase;
}
.wlc-badge::before{content:'●';color:#7FFFC4;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.wlc-title{font-family:var(--serif);font-size:2.6rem;font-weight:900;line-height:1.1;color:#fff;margin-bottom:14px;letter-spacing:-.5px;}
.wlc-title em{font-style:italic;color:#7FFFC4;}
.wlc-sub{font-size:.9rem;color:rgba(255,255,255,.8);margin-bottom:32px;line-height:1.65;}
.btn-primary{
  background:#fff;color:var(--g);border:none;
  padding:15px 36px;border-radius:30px;font-size:1rem;font-weight:900;
  cursor:pointer;display:block;width:100%;
  box-shadow:0 4px 20px rgba(0,0,0,.2);transition:.2s;
}
.btn-primary:hover{transform:translateY(-2px);}
.wlc-trust{display:flex;justify-content:center;gap:16px;margin-top:24px;flex-wrap:wrap;}
.trust-it{display:flex;align-items:center;gap:5px;color:rgba(255,255,255,.7);font-size:.74rem;}

/* Stats strip */
.stats-strip{display:grid;grid-template-columns:repeat(3,1fr);background:var(--g);}
.sst{text-align:center;padding:18px 8px;border-left:1px solid rgba(255,255,255,.15);}
.sst:last-child{border-left:none;}
.sst-n{font-family:var(--serif);font-size:1.7rem;font-weight:900;color:#fff;line-height:1;}
.sst-l{font-size:.68rem;color:rgba(255,255,255,.75);margin-top:3px;}

/* Feature row */
.feat-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:16px;}
.feat-c{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px 12px;}
.feat-em{font-size:1.5rem;margin-bottom:6px;}
.feat-t{font-size:.82rem;font-weight:800;margin-bottom:2px;}
.feat-d{font-size:.72rem;color:var(--sub);}
.wlc-start-btn{
  margin:0 16px 32px;
  background:linear-gradient(135deg,var(--g2),var(--g));color:#fff;border:none;
  padding:16px;border-radius:30px;font-size:1rem;font-weight:900;
  cursor:pointer;width:calc(100% - 32px);
  box-shadow:0 4px 20px rgba(5,150,82,.3);transition:.2s;
}

/* ── QUIZ ── */
#quiz{background:var(--bg);}
.quiz-header{
  position:sticky;top:0;z-index:10;
  background:rgba(255,255,255,.96);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  padding:12px 16px;display:flex;align-items:center;gap:12px;
}
.q-back{
  background:var(--g);border:none;
  color:#fff;font-size:1.1rem;cursor:pointer;
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:.15s;font-weight:900;
  box-shadow:0 2px 8px rgba(5,150,82,.3);
}
.q-back:hover{background:var(--g2);transform:scale(1.08);}
.q-back.hidden{display:none;}
.prog-wrap{flex:1;}
.prog-lbl{font-size:.7rem;color:var(--sub);margin-bottom:4px;}
.prog-bar{height:4px;background:var(--line);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--g2),var(--g));border-radius:2px;transition:width .4s;}
.quiz-body{flex:1;padding:20px 16px 80px;max-width:520px;margin:0 auto;width:100%;}

/* Question hero image */
.q-img{
  width:100%;height:160px;border-radius:14px;overflow:hidden;
  position:relative;margin-bottom:18px;
}
.q-img img{width:100%;height:100%;object-fit:cover;}
.q-img::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(5,150,82,.6));}

.q-num{font-size:.68rem;font-weight:800;letter-spacing:2px;color:var(--g);text-transform:uppercase;margin-bottom:6px;}
.q-text{font-size:1.15rem;font-weight:900;line-height:1.4;margin-bottom:5px;}
.q-hint{font-size:.82rem;color:var(--sub);margin-bottom:18px;line-height:1.5;}
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{
  background:var(--bg2);border:2px solid var(--line);border-radius:12px;
  padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;
  font-size:.9rem;transition:.15s;color:var(--ink);text-align:right;width:100%;
}
.opt:hover{border-color:var(--g);background:var(--g3);}
.opt.on{border-color:var(--g);background:var(--g3);}
.opt-icon{font-size:1.4rem;flex-shrink:0;}
.num-in{
  width:100%;background:var(--bg2);border:2px solid var(--line);border-radius:12px;
  padding:14px;font-size:1.2rem;color:var(--ink);text-align:center;outline:none;transition:.15s;
}
.num-in:focus{border-color:var(--g);}
.slid-val{text-align:center;font-size:1.8rem;font-weight:900;color:var(--g);margin-bottom:10px;}
input[type=range]{width:100%;accent-color:var(--g);cursor:pointer;}
.slid-lbl{display:flex;justify-content:space-between;font-size:.75rem;color:var(--sub);margin-top:4px;}
.btn-next{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--g2),var(--g));color:#fff;border:none;
  border-radius:25px;font-size:.95rem;font-weight:900;cursor:pointer;margin-top:22px;transition:.18s;
}
.btn-next:disabled{opacity:.3;cursor:not-allowed;}
@keyframes shakeAnim{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}

/* ── LOADING ── */
#loading{
  align-items:center;justify-content:center;text-align:center;padding:40px 24px;
  background:var(--bg);
}
.load-img{
  width:200px;height:200px;border-radius:50%;overflow:hidden;
  margin:0 auto 24px;border:4px solid var(--g3);
  box-shadow:0 0 0 8px rgba(5,150,82,.1);
}
.load-img img{width:100%;height:100%;object-fit:cover;}
.spinner-ring{
  width:56px;height:56px;border:3px solid var(--line);border-top-color:var(--g);
  border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg);}}
.load-title{font-size:1.1rem;font-weight:900;color:var(--g);margin-bottom:6px;}
.load-sub{font-size:.82rem;color:var(--sub);margin-bottom:20px;}
.load-steps{max-width:260px;margin:0 auto;}
.lstep{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:.84rem;color:var(--sub);opacity:0;transform:translateX(8px);transition:.4s;border-bottom:1px solid var(--line);}
.lstep:last-child{border:none;}
.lstep.done{opacity:1;transform:translateX(0);color:var(--ink);}
.lstep .dot{width:7px;height:7px;border-radius:50%;background:var(--line);flex-shrink:0;}
.lstep.done .dot{background:var(--g);}

/* ── PAYWALL ── */
#paywall{background:var(--bg);}
.pw-hero{
  position:relative;height:220px;overflow:hidden;
}
.pw-hero-img{
  width:100%;height:100%;object-fit:cover;
}
.pw-hero::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 20%,rgba(5,150,82,.85));
}
.pw-hero-txt{
  position:absolute;bottom:16px;left:0;right:0;
  text-align:center;z-index:2;padding:0 20px;
}
.pw-name{font-family:var(--serif);font-size:1.5rem;font-weight:900;color:#fff;margin-bottom:4px;}
.pw-sub{font-size:.82rem;color:rgba(255,255,255,.85);}
.pw-badges{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;padding:12px 16px;background:var(--g3);border-bottom:1px solid rgba(5,150,82,.2);}
.pw-badge{background:#fff;border:1px solid rgba(5,150,82,.25);color:var(--g);font-size:.7rem;font-weight:700;padding:4px 11px;border-radius:20px;}
.pw-body{padding:16px;}
.pw-title{font-size:.88rem;font-weight:900;text-align:center;margin-bottom:14px;color:var(--ink);}

.plan-card{
  background:var(--bg2);border:2px solid var(--line);border-radius:16px;
  padding:18px;margin-bottom:10px;cursor:pointer;transition:.2s;position:relative;overflow:hidden;
}
.plan-card:hover{border-color:var(--g);transform:translateY(-2px);}
.plan-card.feat{border-color:var(--g);background:linear-gradient(160deg,var(--g3),#fff);}
.plan-card.feat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--g2),var(--g));}
.plan-hot{display:inline-block;background:linear-gradient(135deg,var(--orange),var(--gold));color:#fff;font-size:.65rem;font-weight:900;padding:2px 9px;border-radius:20px;margin-bottom:8px;}
.plan-icon{font-size:2rem;margin-bottom:6px;}
.plan-name{font-size:1rem;font-weight:900;margin-bottom:2px;}
.plan-desc{font-size:.78rem;color:var(--sub);margin-bottom:12px;}
.plan-feats{list-style:none;margin-bottom:14px;}
.plan-feats li{font-size:.8rem;padding:3px 0;display:flex;align-items:center;gap:7px;color:#475569;border-bottom:1px solid var(--line);}
.plan-feats li:last-child{border:none;}
.plan-feats .ck{color:var(--g);font-weight:900;}
.plan-price{display:flex;align-items:baseline;gap:5px;margin-bottom:14px;}
.plan-pnum{font-family:var(--serif);font-size:2.4rem;font-weight:900;color:var(--g);line-height:1;}
.plan-pcur{font-size:.8rem;color:var(--sub);}
.plan-pper{font-size:.72rem;color:var(--sub);}
.plan-btn{width:100%;padding:12px;border:none;border-radius:25px;font-size:.88rem;font-weight:900;cursor:pointer;transition:.18s;text-align:center;display:block;}
.plan-btn-o{background:none;border:2px solid var(--line);color:var(--ink);}
.plan-btn-o:hover{border-color:var(--g);color:var(--g);}
.plan-btn-s{background:linear-gradient(135deg,var(--g2),var(--g));color:#fff;box-shadow:0 4px 16px rgba(5,150,82,.25);}

/* ── CHECKOUT MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal-bg.hid{display:none;}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 18px 36px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;position:relative;border-top:3px solid var(--g);}
.modal-close{position:absolute;top:14px;background:none;border:none;color:var(--sub);font-size:1.2rem;cursor:pointer;}
[dir="rtl"] .modal-close{left:14px;}
[dir="ltr"] .modal-close{right:14px;}
.modal h3{font-size:1rem;font-weight:900;margin-bottom:3px;}
.modal-sub2{font-size:.78rem;color:var(--sub);margin-bottom:16px;}
.flbl{font-size:.76rem;color:var(--sub);margin-bottom:4px;display:block;font-weight:700;}
.fin{width:100%;background:var(--bg2);border:2px solid var(--line);border-radius:10px;padding:11px 13px;font-size:.9rem;color:var(--ink);outline:none;transition:.15s;margin-bottom:11px;}
.fin:focus{border-color:var(--g);}
.price-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:14px;}
.price-row-lbl{font-size:.85rem;color:var(--sub);}
.price-row-val{font-family:var(--serif);font-size:1.3rem;font-weight:900;color:var(--g);}
.pay-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--g2),var(--g));color:#fff;border:none;border-radius:25px;font-size:.95rem;font-weight:900;cursor:pointer;margin-top:6px;}
.secure-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;font-size:.68rem;color:var(--sub);}
.cib-soon{background:var(--bg2);border:1px dashed var(--line);border-radius:12px;padding:12px;text-align:center;margin-top:10px;opacity:.65;}
.cib-soon-t{font-size:.82rem;font-weight:800;margin-bottom:2px;}
.cib-soon-s{font-size:.72rem;color:var(--sub);}
.btn-back{width:100%;padding:9px;background:none;border:1px solid var(--line);border-radius:20px;color:var(--sub);font-size:.8rem;cursor:pointer;margin-top:8px;}

/* ── SUCCESS MODAL ── */
.suc-modal{text-align:center;padding:28px 18px 44px;}
.suc-img{width:120px;height:120px;border-radius:50%;overflow:hidden;margin:0 auto 16px;border:3px solid var(--g3);}
.suc-img img{width:100%;height:100%;object-fit:cover;}
.suc-title{font-family:var(--serif);font-size:1.4rem;font-weight:900;color:var(--g);margin-bottom:6px;}
.suc-sub{font-size:.86rem;color:var(--sub);margin-bottom:12px;}
.suc-email{background:var(--g3);border:1px solid rgba(5,150,82,.25);border-radius:8px;padding:9px 14px;font-size:.86rem;color:var(--g);font-weight:700;margin-bottom:14px;}
.suc-note{font-size:.78rem;color:var(--sub);line-height:1.6;margin-bottom:20px;white-space:pre-line;}
.suc-btn{padding:13px 32px;background:linear-gradient(135deg,var(--g2),var(--g));color:#fff;border:none;border-radius:25px;font-size:.9rem;font-weight:900;cursor:pointer;}

/* ── RESULT ── */
#result{background:var(--bg);}
.res-hero{
  position:relative;height:200px;overflow:hidden;
}
.res-hero-img{width:100%;height:100%;object-fit:cover;}
.res-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 20%,rgba(5,60,30,.88));}
.res-hero-txt{position:absolute;bottom:14px;left:0;right:0;text-align:center;z-index:2;padding:0 16px;}
.res-name{font-family:var(--serif);font-size:1.4rem;font-weight:900;color:#fff;margin-bottom:3px;}
.res-goal{font-size:.78rem;color:rgba(255,255,255,.8);}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 12px 0;}
.stat-c{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:11px 8px;text-align:center;}
.stat-v{font-family:var(--serif);font-size:1.2rem;font-weight:900;color:var(--g);}
.stat-l{font-size:.66rem;color:var(--sub);margin-top:2px;}

.tabs{display:flex;border-bottom:1px solid var(--line);padding:0 12px;}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:.78rem;font-weight:700;color:var(--sub);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:.18s;}
.tab.on{color:var(--g);border-bottom-color:var(--g);}
.tc{display:none;padding:12px;padding-bottom:80px;}
.tc.on{display:block;animation:fd .25s ease;}
@keyframes fd{from{opacity:0;}to{opacity:1;}}
.stitle{font-size:.66rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub);margin:14px 0 8px;}
.stitle:first-child{margin-top:0;}

/* Macros */
.mbar-w{margin-bottom:10px;}
.mbar-lbl{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:3px;}
.mbar{height:6px;background:var(--line);border-radius:3px;overflow:hidden;}
.mbar-f{height:100%;border-radius:3px;transition:width .6s;}

/* Meal cards */
.meal-img-banner{
  width:100%;height:130px;border-radius:12px;overflow:hidden;
  position:relative;margin-bottom:12px;
}
.meal-img-banner img{width:100%;height:100%;object-fit:cover;}
.meal-img-banner::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(5,50,25,.75));}
.meal-img-title{position:absolute;bottom:8px;left:12px;right:12px;z-index:2;color:#fff;font-size:.78rem;font-weight:800;}

.day-grp{background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.day-hd{
  background:var(--g3);padding:10px 14px;font-weight:800;font-size:.88rem;color:var(--g);
  display:flex;align-items:center;gap:8px;cursor:pointer;border-bottom:1px solid rgba(5,150,82,.15);
}
.day-bd{}
.meal-row{border-top:1px solid var(--line);padding:10px 14px;display:flex;gap:10px;align-items:flex-start;}
.meal-row:first-child{border-top:none;}
.meal-em{font-size:1.4rem;flex-shrink:0;}
.meal-inf{}
.meal-slot{font-size:.67rem;color:var(--sub);margin-bottom:2px;font-weight:700;letter-spacing:.5px;}
.meal-dish{font-size:.86rem;line-height:1.45;}
.meal-kcal{font-size:.68rem;color:var(--g);margin-top:2px;font-weight:700;}
.vid-lnk{display:inline-flex;align-items:center;gap:4px;color:var(--orange);font-size:.7rem;text-decoration:none;margin-top:4px;font-weight:700;}

/* Workout cards */
.wk-card{background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.wk-img{height:110px;position:relative;overflow:hidden;}
.wk-img img{width:100%;height:100%;object-fit:cover;}
.wk-img::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(5,50,25,.8));}
.wk-img-txt{position:absolute;bottom:8px;left:12px;right:12px;z-index:2;color:#fff;display:flex;justify-content:space-between;align-items:flex-end;}
.wk-type{font-size:.82rem;font-weight:900;}
.wk-dur{font-size:.7rem;color:rgba(255,255,255,.8);}
.wk-head{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line);}
.wk-badge{background:var(--g3);color:var(--g);padding:2px 9px;border-radius:10px;font-size:.68rem;font-weight:800;}
.wk-bd{padding:8px 14px;}
.ex-row{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--line);}
.ex-row:last-child{border:none;}
.ex-num{width:20px;height:20px;border-radius:50%;background:var(--g3);font-size:.65rem;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--g);}
.ex-name{flex:1;font-size:.82rem;}
.ex-sets{font-size:.7rem;color:var(--gold);font-weight:700;white-space:nowrap;}
.ex-vid{color:var(--orange);font-size:.7rem;text-decoration:none;font-weight:700;}

/* Tip cards */
.tip-c{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;gap:10px;}
.tip-em{font-size:1.3rem;flex-shrink:0;}
.tip-t{font-size:.84rem;font-weight:800;margin-bottom:2px;}

.float-btn{
  position:fixed;bottom:16px;z-index:100;
  background:linear-gradient(135deg,var(--g2),var(--g));
  color:#fff;font-size:.78rem;font-weight:900;
  padding:11px 18px;border-radius:30px;
  box-shadow:0 4px 18px rgba(5,150,82,.4);
  text-decoration:none;animation:bob 3s ease-in-out infinite;cursor:pointer;border:none;
}
[dir="rtl"] .float-btn{left:16px;}
[dir="ltr"] .float-btn{right:16px;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}

function renderQ(){
  const q=t.questions[cur];
  const pct=Math.round(((cur+1)/t.questions.length)*100);
  const lbl=t.qOf.replace('{n}',cur+1).replace('{t}',t.questions.length);
  document.getElementById('progLbl').textContent=lbl;
  document.getElementById('progFill').style.width=pct+'%';

  // Show/hide back button
  const backBtn=document.getElementById('backBtn');
  if(backBtn){
    backBtn.style.display = cur===0 ? 'none' : 'flex';
  }

  // Check if returning to fix an error
  const hasExistingErr = answers[q.id]!==undefined && answers[q.id]!=='' && getQError(q);

  let html=`<div class="q-img"><img src="${q.img}" alt="question" loading="lazy"></div>`;

  html+=`
    <div class="q-num">${lbl}</div>
    <div class="q-text">${q.icon} ${q.q}</div>
    ${q.hint?`<div class="q-hint">${q.hint}</div>`:''}`;

  // Correction banner — shows when returning to fix
  if(hasExistingErr){
    const fixLbl = lang==='ar'?'✏️ صحّح إجابتك أدناه':lang==='fr'?'✏️ Corrigez votre réponse ci-dessous':'✏️ Correct your answer below';
    html+=`<div id="fixBanner" style="display:flex;align-items:center;gap:8px;background:#EFF6FF;border:1.5px solid #BFDBFE;border-radius:10px;padding:10px 14px;margin-bottom:12px;color:#1D4ED8;font-size:.8rem;font-weight:700;">
      <span>🔙</span><span>${fixLbl}</span>
    </div>`;
  }

  // Error box
  html+=`<div id="qErr" style="display:none;background:#FEF2F2;border:1.5px solid #FECACA;border-radius:10px;padding:10px 14px;margin-bottom:12px;color:#DC2626;font-size:.8rem;font-weight:700;align-items:center;gap:8px;"></div>`;

  if(q.type==='opt'){
    html+=`<div class="opts">`;
    q.opts.forEach(o=>{
      const on=answers[q.id]===o.v?'on':'';
      html+=`<button class="opt ${on}" onclick="selOpt('${q.id}','${o.v}',this)">
        <span class="opt-icon">${o.i}</span><span>${o.l}</span></button>`;
    });
    html+=`</div>`;
  } else if(q.type==='num'){
    const val=answers[q.id]||'';
    const hasErr=val&&!isNumValid(q,val);
    html+=`<input class="num-in" type="number" id="nv" placeholder="${q.ph}"
      value="${val}" inputmode="numeric"
      style="border-color:${hasErr?'#FCA5A5':val?'var(--g)':'var(--line)'}"
      oninput="onNumInput(this,'${q.id}','${q.unit}')">
      <div style="text-align:center;color:var(--sub);font-size:.82rem;margin-top:5px">${q.unit}</div>
      <div style="text-align:center;font-size:.74rem;color:var(--sub);margin-top:6px;opacity:.7">
        ${q.id==='height'?(lang==='ar'?'القيمة بين 100 و 250':lang==='fr'?'Entre 100 et 250':'Between 100 and 250')
        :q.id==='weight'||q.id==='target_weight'?(lang==='ar'?'القيمة بين 20 و 300':lang==='fr'?'Entre 20 et 300':'Between 20 and 300')
        :''}
      </div>`;
  } else if(q.type==='sl'){
    const v=answers[q.id]||q.def; if(!answers[q.id])answers[q.id]=q.def;
    html+=`<div class="slid-val" id="sv">${v} ${q.unit}</div>
      <input type="range" min="${q.min}" max="${q.max}" value="${v}"
        oninput="document.getElementById('sv').textContent=this.value+' ${q.unit}';answers['${q.id}']=+this.value;clearQErr()">
      <div class="slid-lbl"><span>${q.min}</span><span>${q.max}</span></div>`;
  } else if(q.type==='ti'){
    const val=answers[q.id]||'';
    const hasErr=val&&val.trim().length<2;
    html+=`<input class="num-in" type="text" id="nv" placeholder="${q.ph||''}"
      value="${val}" style="font-size:1rem;border-color:${hasErr?'#FCA5A5':val?'var(--g)':'var(--line)'}"
      oninput="onTextInput(this,'${q.id}')">`;
  }

  const isLast=cur===t.questions.length-1;
  const ok=isAnsweredOk(q);

  // If fixing an error: show clear button + next
  if(hasExistingErr && q.type!=='opt'){
    html+=`<div style="display:flex;gap:8px;margin-top:22px;">
      <button onclick="clearAnswer('${q.id}')" style="flex:0 0 auto;padding:14px 16px;background:var(--bg2);border:2px solid var(--line);border-radius:25px;font-size:.8rem;font-weight:700;cursor:pointer;color:var(--sub);">
        ${lang==='ar'?'🗑️ مسح':lang==='fr'?'🗑️ Effacer':'🗑️ Clear'}
      </button>
      <button class="btn-next" id="bn" onclick="nextQ()" ${ok?'':'disabled'} style="flex:1;">
        ${lang==='ar'?'✅ تأكيد التصحيح':lang==='fr'?'✅ Confirmer':'✅ Confirm Fix'}
      </button>
    </div>`;
  } else {
    html+=`<button class="btn-next" id="bn" onclick="nextQ()" ${ok?'':'disabled'}>
      ${isLast?t.fin:t.nxt}</button>`;
  }

  document.getElementById('quizBody').innerHTML=html;

  // Auto-focus number/text inputs
  const el=document.getElementById('nv');
  if(el){
    setTimeout(()=>{
      el.focus();
      el.select(); // select all to make it easy to retype
    },100);
  }

  // Show existing error when returning
  if(hasExistingErr){
    setTimeout(()=>{
      const err=getQError(q);
      if(err) showQErr(err);
    },200);
  }
}

/* ── Validation helpers ── */
function isNumValid(q,val){
  const n=parseFloat(val);
  if(isNaN(n)||n<=0) return false;
  if(q.id==='height') return n>=100&&n<=250;
  if(q.id==='weight') return n>=20&&n<=300;
  if(q.id==='target_weight') return n>=30&&n<=300;
  return true;
}

function isAnsweredOk(q){
  const v=answers[q.id];
  if(v===undefined||v===''||v===null) return false;
  if(q.type==='num') return isNumValid(q,v);
  if(q.type==='ti') return String(v).trim().length>=2;
  return true;
}

function getQError(q){
  const v=answers[q.id];
  const L=lang;
  const E={
    empty:      {ar:'الرجاء الإجابة على هذا السؤال',en:'Please answer this question',fr:'Veuillez répondre à cette question'},
    opt:        {ar:'الرجاء اختيار أحد الخيارات',en:'Please select an option',fr:'Veuillez sélectionner une option'},
    name:       {ar:'الاسم قصير — أدخل حرفين على الأقل',en:'Name too short — at least 2 characters',fr:'Nom trop court — minimum 2 caractères'},
    height:     {ar:'طول غير صحيح — أدخل قيمة بين 100 و 250 سم',en:'Invalid height — enter between 100-250 cm',fr:'Taille invalide — entre 100 et 250 cm'},
    weight:     {ar:'وزن غير صحيح — أدخل قيمة بين 20 و 300 كغ',en:'Invalid weight — enter between 20-300 kg',fr:'Poids invalide — entre 20 et 300 kg'},
    target:     {ar:'الوزن المستهدف غير صحيح — أدخل بين 30 و 300 كغ',en:'Invalid target — enter between 30-300 kg',fr:'Cible invalide — entre 30 et 300 kg'},
  };
  const m=k=>E[k][L]||E[k].ar;
  if(!v||v==='') return m(q.type==='opt'?'opt':'empty');
  if(q.type==='ti' && String(v).trim().length<2) return m('name');
  if(q.type==='num'){
    const n=parseFloat(v);
    if(isNaN(n)||n<=0){
      if(q.id==='height') return m('height');
      if(q.id==='weight') return m('weight');
      if(q.id==='target_weight') return m('target');
      return m('empty');
    }
    if(q.id==='height'&&(n<100||n>250)) return m('height');
    if(q.id==='weight'&&(n<20||n>300)) return m('weight');
    if(q.id==='target_weight'&&(n<30||n>300)) return m('target');
  }
  return null;
}

function showQErr(msg){
  const el=document.getElementById('qErr');
  if(!el) return;
  el.style.display='flex';
  el.innerHTML=`<span style="font-size:1rem;flex-shrink:0">⚠️</span><span>${msg}</span>`;
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
  const inp=document.getElementById('nv');
  if(inp){ inp.style.borderColor='#FCA5A5'; inp.focus(); }
}

function clearQErr(){
  const el=document.getElementById('qErr');
  if(el) el.style.display='none';
  const inp=document.getElementById('nv');
  if(inp && inp.style.borderColor==='#FCA5A5') inp.style.borderColor='var(--line)';
}

function onNumInput(el,id,unit){
  answers[id]=el.value;
  clearQErr();
  const q=t.questions[cur];
  const bn=document.getElementById('bn');
  if(!el.value){ bn.disabled=true; el.style.borderColor='var(--line)'; return; }
  if(isNumValid(q,el.value)){
    bn.disabled=false;
    el.style.borderColor='var(--g)';
  } else {
    bn.disabled=true;
    el.style.borderColor='#FCA5A5';
    // Show hint without blocking
    const n=parseFloat(el.value);
    if(!isNaN(n)&&n>0){
      const err=getQError(q);
      if(err) showQErr(err);
    }
  }
}

function onTextInput(el,id){
  answers[id]=el.value;
  clearQErr();
  const bn=document.getElementById('bn');
  const ok=el.value.trim().length>=2;
  bn.disabled=!ok;
  el.style.borderColor=ok?'var(--g)':el.value.length>0?'#FCA5A5':'var(--line)';
}

function selOpt(id,v,el){
  answers[id]=v;
  document.querySelectorAll('.opt').forEach(o=>o.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('bn').disabled=false;
  clearQErr();
  // Auto advance after short delay for options
  setTimeout(()=>nextQ(),280);
}

function clearAnswer(id){
  answers[id]='';
  renderQ();
}

function nextQ(){
  const q=t.questions[cur];
  const err=getQError(q);
  if(err){ showQErr(err); return; }
  if(cur<t.questions.length-1){ cur++; renderQ(); }
  else showLoad();
}

function prevQ(){
  clearQErr();
  if(cur>0){
    cur--;
    renderQ();
    // Scroll to top of quiz body
    setTimeout(()=>{
      const qb=document.getElementById('quizBody');
      if(qb) qb.scrollIntoView({behavior:'smooth',block:'start'});
    },100);
  } else {
    show('welcome');
  }
}

// ════ CHARGILY PAY ════
const CHARGILY_PK = 'live_pk_1dWzkH0mnzWlFUi0lBTDbgup9kGHr33Vw7YemXei';
const CHARGILY_SK = 'live_sk_zQRrSuolVKKwH702K66XqgRcrB0EOhTFLXvD6Kvz';

async function payWithChargily(){
  const email = document.getElementById('buyerEmail').value.trim();
  const name  = document.getElementById('buyerName').value.trim();
  if(!name){alert(t.alert_name);return;}
  if(!email||!email.includes('@')){alert(t.alert_email);return;}

  const btn   = document.getElementById('chargilyBtn');
  const load  = document.getElementById('chargilyLoading');
  const errEl = document.getElementById('chargilyError');

  btn.style.display  = 'none';
  load.style.display = 'block';
  errEl.style.display= 'none';

  const amountDZD = selPlan==='week' ? 1400 : 700; // ~10$ and ~5$ in DZD
  const description= selPlan==='week'
    ? (t.lang==='ar'?'برنامج صحي أسبوعي — AYACHI INFO':'Weekly Health Plan — AYACHI INFO')
    : (t.lang==='ar'?'برنامج صحي يوم واحد — AYACHI INFO':'1-Day Health Plan — AYACHI INFO');

  try {
    // Chargily API v2 — Create Checkout
    const resp = await fetch('https://pay.chargily.net/api/v2/checkouts', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${CHARGILY_SK}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        amount: amountDZD,
        currency: 'dzd',
        customer_email: email,
        customer_name: name,
        description: description,
        success_url: 'https://elayachiauto-code.github.io/Hapitoslife/app.html?payment=success&email=' + encodeURIComponent(email) + '&plan=' + selPlan + '&name=' + encodeURIComponent(name),
        failure_url: 'https://elayachiauto-code.github.io/Hapitoslife/app.html?payment=failed',
        payment_method: 'edahabia',
        locale: 'ar',
        metadata: {
          plan: selPlan,
          buyer_name: name,
          buyer_email: email
        }
      })
    });

    if(!resp.ok){
      const err = await resp.json();
      throw new Error(err.message || 'Chargily API error');
    }

    const data = await resp.json();

    if(data.checkout_url){
      // Redirect to Chargily payment page
      window.location.href = data.checkout_url;
    } else {
      throw new Error('No checkout URL returned');
    }

  } catch(err){
    console.error('Chargily error:', err);
    load.style.display  = 'none';
    btn.style.display   = 'block';
    errEl.style.display = 'block';
    errEl.textContent   = t.lang==='ar'
      ? '❌ خطأ في الاتصال. تأكد من الإنترنت وحاول مجدداً.'
      : '❌ Connection error. Please try again.';
  }
}

// ════ CHECK RETURN FROM CHARGILY ════
function checkChargilyReturn(){
  const params = new URLSearchParams(window.location.search);
  if(params.get('payment') === 'success'){
    const email = decodeURIComponent(params.get('email')||'');
    const plan  = params.get('plan')||'week';
    selPlan = plan;
    // Clean URL
    window.history.replaceState({},document.title, window.location.pathname);
    if(email){
      // Show success and send email
      document.getElementById('sentEmail').textContent = email;
      document.getElementById('sucTitle').textContent  = t.sucTitle;
      document.getElementById('sucSub').textContent    = t.sucSub;
      document.getElementById('sucNote').textContent   = t.sucNote;
      document.getElementById('sucBtn').textContent    = t.sucBtn;
      document.getElementById('successModal').classList.remove('hid');
      // Send plan email
      const name = params.get('name') || email.split('@')[0];
      sendEmail(name, email).catch(e=>console.error('Email error:',e));
    }
  }
  if(params.get('payment') === 'failed'){
    window.history.replaceState({},document.title, window.location.pathname);
    alert(t.lang==='ar' ? '❌ فشل الدفع. حاول مجدداً.' : '❌ Payment failed. Please try again.');
  }
}
function sendEmail(name,email){
  const a=answers;
  const age=+a.age||30,h=+a.height||170,w=+a.weight||80,tw=+a.target_weight||70;
  const g=a.gender||'male',goal=a.goal||'loss',act=a.activity||'moderate',diet=a.diet||'none',dis=a.diseases||'none';
  let bmr=g==='male'?10*w+6.25*h-5*age+5:10*w+6.25*h-5*age-161;
  const am={sedentary:1.2,light:1.375,moderate:1.55,high:1.725};
  let kcal=Math.max(Math.round(bmr*(am[act]||1.55))+(goal==='loss'?-500:goal==='muscle'?300:0),1200);
  const bmi=(w/(h/100)**2).toFixed(1),weeks=Math.round(Math.abs(w-tw)/0.5);
  const prot=Math.round(w*(goal==='muscle'?2.2:1.8)),fat=Math.round(kcal*.25/9),carb=Math.round((kcal-prot*4-fat*9)/4);
  return emailjs.send('service_6noyhsp','template_iv8kbbj',{
    to_name:name,to_email:email,
    plan_type:t.planTypeLbl[selPlan],goal_label:t.goalLbls[goal],
    daily_calories:kcal,bmi,weeks_to_goal:weeks,target_weight:tw,
    protein:prot,carbs:carb,fats:fat,
    meal_plan_html:buildEmailMeals(goal,diet),
    workout_plan_html:buildEmailWorkouts(goal,act,dis),
    extra_tips:buildEmailTips(goal,dis,diet)
  });
}

function getR(goal,diet){
  const base={...RECIPES[lang]||RECIPES.ar};
  const veg=diet==='veg',noRed=diet==='nored';
  if(veg){base.chicken_q={...base.chicken_q,n:lang==='ar'?'توفو مشوي + كينوا + سلطة':lang==='fr'?'Tofu grillé + quinoa + salade':'Grilled tofu + quinoa + salad'};base.steak={...base.steak,n:lang==='ar'?'ستيك قرنبيط مشوي + خضار':lang==='fr'?'Steak choufleur + légumes':'Cauliflower steak + veggies'};base.fish={...base.fish,n:lang==='ar'?'فلافل مشوية + سلطة':lang==='fr'?'Falafels grillés + salade':'Baked falafel + salad'};}
  if(noRed){base.steak={...base.steak,n:lang==='ar'?'دجاج مشوي + خضار':lang==='fr'?'Poulet grillé + légumes':'Grilled chicken + veggies'};base.tagine={...base.tagine,n:lang==='ar'?'سمك فيليه بالخضار':lang==='fr'?'Filet de poisson légumes':'Fish fillet with veggies'};}
  return base;
}

function buildEmailMeals(goal,diet){
  const R=getR(goal,diet),p=PLANS_DATA[goal]||PLANS_DATA.loss;
  const useDays=selPlan==='day'?[t.days[0]]:t.days;
  const useP=selPlan==='day'?[p[0]]:p;
  return useDays.map((day,i)=>{
    const dp=useP[i];
    const meals=t.slots.map((s,si)=>{const r=R[dp[si]]||R.omelette;
      return `<div class="meal-row"><span class="meal-em">${r.e}</span><div><span class="meal-slot">${s.l} · ${s.t}</span><div class="meal-dish">${r.n}</div><div class="meal-kcal">${r.k} ${t.calDay}</div></div></div>`;}).join('');
    return `<div class="meal-day"><div class="meal-day-title">📅 ${day}</div>${meals}</div>`;
  }).join('');
}
function buildEmailWorkouts(goal,act,dis){
  const E=EXERCISES[lang]||EXERCISES.ar;
  const noJ=dis==='joints',noH=dis==='heart';
  const sch=SCHEDULES[goal]||SCHEDULES.loss;
  const useDays=selPlan==='day'?[t.days[0]]:t.days;
  const useSch=selPlan==='day'?[sch[0]]:sch;
  if(noJ)useSch.forEach(d=>{d.e=d.e.map(e=>['squat','lunge','deadlift','pullup'].includes(e)?'chair':e);});
  if(noH)useSch.forEach(d=>{d.e=d.e.map(e=>['hiit','rope'].includes(e)?'walk':e);});
  return useDays.map((day,i)=>{
    const d=useSch[i];
    const exH=d.e.map(id=>{const ex=E[id]||E.walk;return `<div class="ex-item"><span>${ex.n}</span><span class="ex-sets">${ex.s}</span></div>`;}).join('');
    return `<div class="workout-block"><div class="workout-day"><span class="wk-badge">${day}</span><span class="wk-type">${d.t}</span></div>${exH}</div>`;
  }).join('');
}
function buildEmailTips(goal,dis,diet){
  let h='';
  const gt=t.goalTips[goal];if(gt)h+=`<div class="tip-row"><span>${gt.e}</span><div><b>${gt.t}</b><br><span style="color:#64748b">${gt.b}</span></div></div>`;
  t.tips.slice(0,3).forEach(tp=>{h+=`<div class="tip-row"><span>${tp.e}</span><div><b>${tp.t}</b><br><span style="color:#64748b">${tp.b}</span></div></div>`;});
  const dt=t.disTips[dis];if(dt)h+=`<div class="tip-row"><span>${dt.e}</span><div><b>${dt.t}</b><br><span style="color:#64748b">${dt.b}</span></div></div>`;
  return h;
}

function buildMealsHTML(goal,diet){
  const R=getR(goal,diet),p=PLANS_DATA[goal]||PLANS_DATA.loss;
  const useDays=selPlan==='day'?[t.days[0]]:t.days;
  const useP=selPlan==='day'?[p[0]]:p;
  const slotKeys=['breakfast','lunch','dinner'];
  return useDays.map((day,i)=>{
    const dp=useP[i];
    const meals=t.slots.map((s,si)=>{
      const r=R[dp[si]]||R.omelette;
      return `<div class="meal-row">
        <div class="meal-em">${r.e}</div>
        <div class="meal-inf">
          <div class="meal-slot">${s.l} · ${s.t}</div>
          <div class="meal-dish">${r.n}</div>
          <div class="meal-kcal">${r.k} ${t.calDay}</div>
          <a class="vid-lnk" target="_blank" href="${YT}${encodeURIComponent(r.q)}">${t.vidTxt}</a>
        </div>
      </div>`;
    }).join('');
    const imgKey=slotKeys[i%3];
    return `<div class="day-grp">
      <div class="meal-img-banner">
        <img src="${MEAL_IMGS[imgKey]||MEAL_IMGS.breakfast}" alt="${day}" loading="lazy">
        <div class="meal-img-title">📅 ${day}</div>
      </div>
      <div class="day-bd">${meals}</div>
    </div>`;
  }).join('');
}

function buildWorkoutsHTML(goal,act,dis){
  const E=EXERCISES[lang]||EXERCISES.ar;
  const noJ=dis==='joints',noH=dis==='heart';
  const sch=JSON.parse(JSON.stringify(SCHEDULES[goal]||SCHEDULES.loss));
  const useDays=selPlan==='day'?[t.days[0]]:t.days;
  const useSch=selPlan==='day'?[sch[0]]:sch;
  if(noJ)useSch.forEach(d=>{d.e=d.e.map(e=>['squat','lunge','deadlift','pullup'].includes(e)?'chair':e);});
  if(noH)useSch.forEach(d=>{d.e=d.e.map(e=>['hiit','rope'].includes(e)?'walk':e);});
  const durUnit=lang==='ar'?'دق':'min';
  return useSch.map((d,i)=>{
    const exHTML=d.e.map(id=>{
      const ex=E[id]||E.walk;
      return `<div class="ex-row"><div class="ex-num">▸</div><div class="ex-name">${ex.n}</div>

        <a class="ex-vid" target="_blank" href="${YT}${encodeURIComponent(ex.q)}">${t.vidEx}</a></div>`;

function buildTipsHTML(goal,dis,diet){
  let h='';
  const gt=t.goalTips[goal];
  if(gt) h+=`<div class="tip-c" style="border-right:3px solid var(--g)"><span class="tip-em">${gt.e}</span><div><div class="tip-t">${gt.t}</div><div class="tip-b">${gt.b}</div></div></div>`;

function swTab(idx,btn){

function show(id){
