<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تصاميم منشورات أسبوعية – AYACHI INFO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --g:#059652;--g2:#047A42;--g3:#E8F7EF;
  --ink:#0D1B2A;--sub:#4A5568;--line:#E2E8F0;
  --bg:#F8FAFC;--white:#fff;
  --orange:#E85D2F;--gold:#D4970A;--red:#DC2626;
  --purple:#7C3AED;--blue:#2563EB;--pink:#DB2777;
  --sans:'Tahoma','Segoe UI',Arial,sans-serif;
  --serif:'Georgia',serif;
}
html,body{min-height:100%;background:var(--bg);font-family:var(--sans);color:var(--ink);}

/* ── NAV ── */
nav{
  background:#fff;border-bottom:2px solid var(--g);
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.06);
}
.nav-brand{font-size:.8rem;font-weight:900;color:var(--g);letter-spacing:2px;}
.nav-sub{font-size:.68rem;color:var(--sub);}

/* ── PLATFORM SELECTOR ── */
.platform-bar{
  display:flex;gap:8px;padding:14px 14px 10px;overflow-x:auto;
  background:#fff;border-bottom:1px solid var(--line);
}
.plat-btn{
  flex:0 0 auto;display:flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:20px;border:2px solid var(--line);
  background:none;font-size:.78rem;font-weight:700;cursor:pointer;transition:.15s;
  white-space:nowrap;
}
.plat-btn.on{border-color:var(--g);background:var(--g3);color:var(--g);}

/* ── DAY TABS ── */
.days-bar{
  display:flex;gap:6px;padding:12px 14px;overflow-x:auto;
  background:#fff;border-bottom:1px solid var(--line);
}
.day-btn{
  flex:0 0 auto;padding:7px 14px;border-radius:14px;
  border:1px solid var(--line);background:none;font-size:.76rem;font-weight:700;
  cursor:pointer;transition:.15s;white-space:nowrap;
}
.day-btn.on{background:var(--ink);color:#fff;border-color:var(--ink);}

/* ── MAIN LAYOUT ── */
.main{padding:14px;max-width:680px;margin:0 auto;}

/* ── POST PREVIEW ── */
.post-wrap{
  display:none;
  animation:fd .3s ease;
}
.post-wrap.on{display:block;}
@keyframes fd{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* Platform frame */
.frame-fb{
  background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;
  box-shadow:0 2px 16px rgba(0,0,0,.06);margin-bottom:12px;
}
.fb-header{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);}
.fb-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--g2),var(--g));display:flex;align-items:center;justify-content:center;color:#fff;font-size:.75rem;font-weight:900;flex-shrink:0;}
.fb-name{font-size:.85rem;font-weight:800;}
.fb-time{font-size:.7rem;color:var(--sub);}
.fb-reactions{display:flex;gap:0;padding:8px 14px;border-top:1px solid var(--line);}
.fb-react{flex:1;text-align:center;padding:6px 0;font-size:.78rem;color:var(--sub);font-weight:600;}

.frame-ig{
  background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;
  box-shadow:0 2px 16px rgba(0,0,0,.06);margin-bottom:12px;
}
.ig-header{display:flex;align-items:center;gap:10px;padding:10px 12px;}
.ig-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);padding:2px;}
.ig-avatar-inner{width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,var(--g2),var(--g));display:flex;align-items:center;justify-content:center;color:#fff;font-size:.65rem;font-weight:900;}
.ig-name{font-size:.82rem;font-weight:800;flex:1;}
.ig-dots{font-size:1.2rem;color:var(--sub);}
.ig-actions{display:flex;justify-content:space-between;padding:8px 12px;}
.ig-left{display:flex;gap:14px;}
.ig-icon{font-size:1.3rem;cursor:pointer;}
.ig-likes{font-size:.8rem;font-weight:800;padding:0 12px 4px;}
.ig-cap{font-size:.78rem;padding:0 12px 6px;line-height:1.5;color:var(--ink);}
.ig-tags{font-size:.75rem;color:#2563EB;padding:0 12px 10px;}

.frame-tt{
  background:#000;border-radius:12px;overflow:hidden;
  box-shadow:0 2px 16px rgba(0,0,0,.2);margin-bottom:12px;position:relative;
}
.tt-side{position:absolute;bottom:80px;right:10px;display:flex;flex-direction:column;gap:16px;align-items:center;z-index:2;}
.tt-side-icon{display:flex;flex-direction:column;align-items:center;gap:3px;}
.tt-side-em{font-size:1.6rem;}
.tt-side-n{font-size:.62rem;color:#fff;}
.tt-bottom{position:absolute;bottom:12px;left:12px;right:70px;z-index:2;}
.tt-user{font-size:.8rem;font-weight:900;color:#fff;margin-bottom:4px;}
.tt-desc{font-size:.74rem;color:rgba(255,255,255,.85);line-height:1.5;}
.tt-music{font-size:.68rem;color:#fff;margin-top:6px;display:flex;align-items:center;gap:5px;}

/* ── POST CANVAS ── */
.post-canvas{
  position:relative;width:100%;aspect-ratio:1/1;overflow:hidden;
  font-family:var(--sans);
}
.post-canvas.story{aspect-ratio:9/16;}
.post-canvas.reel{aspect-ratio:9/16;}

/* === DAY 1: BMI INFOGRAPHIC === */
.d1{background:linear-gradient(135deg,#0D1B2A 0%,#1a3a2a 100%);}
.d1-bg-img{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=800&q=80') center/cover;opacity:.18;}
.d1-content{position:relative;z-index:2;padding:24px;height:100%;display:flex;flex-direction:column;justify-content:space-between;}
.d1-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(5,150,82,.25);border:1px solid rgba(5,150,82,.5);color:#7FFFC4;font-size:.65rem;font-weight:900;padding:4px 12px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;}
.d1-title{font-size:1.8rem;font-weight:900;color:#fff;line-height:1.15;margin-top:8px;}
.d1-title span{color:#7FFFC4;}
.d1-bmi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px;}
.d1-bmi-item{background:rgba(255,255,255,.07);border-radius:10px;padding:10px 6px;text-align:center;}
.d1-bmi-range{font-size:.8rem;font-weight:900;}
.d1-bmi-lbl{font-size:.6rem;color:rgba(255,255,255,.6);margin-top:2px;}
.d1-cta{background:linear-gradient(135deg,#047A42,#059652);color:#fff;padding:10px 20px;border-radius:25px;font-size:.75rem;font-weight:900;text-align:center;margin-top:10px;}
.d1-brand{font-size:.6rem;color:rgba(255,255,255,.4);text-align:center;letter-spacing:1px;}

/* === DAY 2: BEFORE/AFTER === */
.d2{background:#fff;}
.d2-header{background:linear-gradient(90deg,var(--g2),var(--g));padding:14px 18px;display:flex;justify-content:space-between;align-items:center;}
.d2-header-t{font-size:1rem;font-weight:900;color:#fff;}
.d2-header-s{font-size:.65rem;color:rgba(255,255,255,.8);}
.d2-body{padding:14px;}
.d2-person{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.d2-photo{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--g3);}
.d2-arrow-box{display:flex;align-items:center;gap:8px;flex:1;}
.d2-num{font-family:var(--serif);font-size:1.3rem;font-weight:900;}
.d2-arrow{font-size:1.2rem;color:var(--g);}
.d2-info{font-size:.72rem;color:var(--sub);}
.d2-tag{display:inline-block;background:var(--g3);color:var(--g);font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:3px;}
.d2-cta-box{background:var(--g3);border-radius:12px;padding:12px 14px;text-align:center;margin-top:6px;}
.d2-cta-t{font-size:.82rem;font-weight:900;color:var(--g);margin-bottom:4px;}
.d2-cta-s{font-size:.68rem;color:var(--sub);}

/* === DAY 3: 5 TIPS CAROUSEL === */
.d3{background:linear-gradient(160deg,#1e3a5f 0%,#0d2818 100%);}
.d3-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1518310383802-640c2de311b2?w=800&q=80') center/cover;opacity:.1;}
.d3-content{position:relative;z-index:2;padding:20px;height:100%;display:flex;flex-direction:column;}
.d3-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.d3-num{font-family:var(--serif);font-size:3rem;font-weight:900;color:rgba(255,255,255,.15);line-height:1;}
.d3-cat{font-size:.65rem;font-weight:900;color:#7FFFC4;letter-spacing:2px;text-transform:uppercase;}
.d3-title{font-size:1.5rem;font-weight:900;color:#fff;line-height:1.2;margin-bottom:8px;}
.d3-tips{display:flex;flex-direction:column;gap:8px;flex:1;}
.d3-tip{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.07);border-radius:10px;padding:9px 12px;}
.d3-tip-em{font-size:1.2rem;flex-shrink:0;}
.d3-tip-t{font-size:.78rem;color:#fff;font-weight:700;}
.d3-bar{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.d3-brand{font-size:.6rem;color:rgba(255,255,255,.35);letter-spacing:1px;}
.d3-cta{background:rgba(5,150,82,.3);border:1px solid rgba(5,150,82,.5);color:#7FFFC4;font-size:.65rem;font-weight:900;padding:5px 12px;border-radius:15px;}

/* === DAY 4: CALORIE EXPLAINER === */
.d4{background:#fff;}
.d4-img{width:100%;height:38%;object-fit:cover;object-position:center 30%;}
.d4-content{padding:14px;}
.d4-badge{display:inline-block;background:var(--orange);color:#fff;font-size:.62rem;font-weight:900;padding:3px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:.5px;}
.d4-title{font-size:1.1rem;font-weight:900;line-height:1.3;margin-bottom:12px;}
.d4-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.d4-item{background:var(--g3);border-radius:10px;padding:10px 12px;position:relative;}
.d4-item-n{font-family:var(--serif);font-size:1.6rem;font-weight:900;color:var(--g);line-height:1;}
.d4-item-lbl{font-size:.68rem;color:var(--sub);margin-top:2px;}
.d4-cta{background:linear-gradient(135deg,var(--g2),var(--g));color:#fff;padding:10px;border-radius:12px;text-align:center;font-size:.78rem;font-weight:900;margin-top:10px;}

/* === DAY 5: WORKOUT PLAN === */
.d5{background:#0D1B2A;}
.d5-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=800&q=80') center/cover;opacity:.2;}
.d5-content{position:relative;z-index:2;padding:20px;height:100%;display:flex;flex-direction:column;}
.d5-title{font-size:1.4rem;font-weight:900;color:#fff;line-height:1.2;margin-bottom:3px;}
.d5-sub{font-size:.72rem;color:rgba(255,255,255,.6);margin-bottom:14px;}
.d5-days{display:flex;flex-direction:column;gap:6px;flex:1;}
.d5-day{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.07);border-radius:10px;padding:9px 12px;}
.d5-day-name{font-size:.68rem;font-weight:900;color:#7FFFC4;width:48px;flex-shrink:0;}
.d5-day-type{flex:1;}
.d5-day-t{font-size:.8rem;font-weight:800;color:#fff;}
.d5-day-s{font-size:.65rem;color:rgba(255,255,255,.5);}
.d5-day-dur{font-size:.65rem;color:rgba(255,255,255,.5);white-space:nowrap;}
.d5-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.1);}
.d5-brand{font-size:.58rem;color:rgba(255,255,255,.3);letter-spacing:1.5px;}
.d5-cta{background:var(--g);color:#fff;font-size:.65rem;font-weight:900;padding:5px 12px;border-radius:15px;}

/* === DAY 6: FEMALE FOCUS === */
.d6{background:#fff;}
.d6-header{position:relative;height:45%;overflow:hidden;}
.d6-header img{width:100%;height:100%;object-fit:cover;object-position:center 20%;}
.d6-header::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 20%,rgba(219,39,119,.7));}
.d6-header-txt{position:absolute;bottom:12px;left:16px;right:16px;z-index:2;}
.d6-title{font-size:1.3rem;font-weight:900;color:#fff;line-height:1.2;}
.d6-sub{font-size:.72rem;color:rgba(255,255,255,.85);}
.d6-body{padding:14px;}
.d6-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.d6-card{border-radius:12px;padding:12px;text-align:center;}
.d6-card.pink{background:#FDF2F8;border:1px solid #FBCFE8;}
.d6-card.green{background:var(--g3);border:1px solid rgba(5,150,82,.2);}
.d6-em{font-size:1.6rem;margin-bottom:4px;}
.d6-t{font-size:.8rem;font-weight:800;margin-bottom:2px;}
.d6-d{font-size:.7rem;color:var(--sub);}
.d6-cta{background:linear-gradient(135deg,#DB2777,#BE185D);color:#fff;padding:10px;border-radius:12px;text-align:center;font-size:.75rem;font-weight:900;margin-top:10px;}

/* === DAY 7: CTA OFFER === */
.d7{background:#0D1B2A;position:relative;overflow:hidden;}
.d7-bg{position:absolute;inset:0;background:url('https://images.unsplash.com/photo-1526506118085-60ce8714f8c5?w=800&q=80') center/cover;opacity:.15;}
.d7-glow{position:absolute;top:-20%;left:50%;transform:translateX(-50%);width:80%;height:60%;background:radial-gradient(ellipse,rgba(5,150,82,.3),transparent 70%);pointer-events:none;}
.d7-content{position:relative;z-index:2;padding:24px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.d7-label{font-size:.62rem;font-weight:900;color:#7FFFC4;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:10px;}
.d7-title{font-family:var(--serif);font-size:1.9rem;font-weight:900;color:#fff;line-height:1.15;margin-bottom:8px;}
.d7-title em{font-style:italic;color:#7FFFC4;}
.d7-sub{font-size:.82rem;color:rgba(255,255,255,.7);line-height:1.6;margin-bottom:18px;max-width:260px;}
.d7-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;margin-bottom:18px;}
.d7-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px 8px;text-align:center;}
.d7-price{font-family:var(--serif);font-size:1.8rem;font-weight:900;color:#7FFFC4;line-height:1;}
.d7-plan{font-size:.7rem;color:rgba(255,255,255,.6);margin-top:3px;}
.d7-card.feat{background:rgba(5,150,82,.2);border-color:rgba(5,150,82,.4);}
.d7-cta{background:linear-gradient(135deg,#047A42,#059652);color:#fff;font-size:.88rem;font-weight:900;padding:13px 36px;border-radius:30px;width:100%;max-width:280px;box-shadow:0 0 30px rgba(5,150,82,.4);}
.d7-trust{display:flex;gap:14px;margin-top:12px;}
.d7-trust-item{font-size:.62rem;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:4px;}

/* ── CAPTION BOX ── */
.caption-box{
  background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:0;
  position:relative;
}
.cap-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.cap-title{font-size:.78rem;font-weight:800;color:var(--ink);}
.copy-btn{
  background:var(--g3);border:1px solid rgba(5,150,82,.3);color:var(--g);
  font-size:.7rem;font-weight:700;padding:5px 12px;border-radius:14px;cursor:pointer;border:none;
  transition:.15s;
}
.copy-btn:hover{background:var(--g);color:#fff;}
.cap-text{font-size:.8rem;line-height:1.65;color:var(--ink);white-space:pre-wrap;word-break:break-word;}
.cap-tags{font-size:.74rem;color:#2563EB;margin-top:8px;line-height:1.7;}

/* ── INFO BAR ── */
.info-bar{
  background:var(--g3);border:1px solid rgba(5,150,82,.2);border-radius:12px;
  padding:12px 14px;margin-top:0;display:flex;gap:10px;align-items:flex-start;
}
.info-icon{font-size:1.2rem;flex-shrink:0;}
.info-text{font-size:.77rem;color:var(--sub);line-height:1.55;}
.info-text strong{color:var(--ink);}

/* ── DOWNLOAD BTN ── */
.dl-btn{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--g2),var(--g));color:#fff;
  border:none;border-radius:12px;font-size:.9rem;font-weight:900;
  cursor:pointer;margin-top:0;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.dl-btn:hover{box-shadow:0 4px 20px rgba(5,150,82,.3);}

/* ── GAP ── */
.gap{height:10px;}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div>
    <div class="nav-brand">AYACHI INFO • تصاميم منشورات</div>
    <div class="nav-sub">أسبوع كامل — فيسبوك • انستغرام • تيك توك</div>
  </div>
  <div style="font-size:1.4rem;">📱</div>
</nav>

<!-- PLATFORM -->
<div class="platform-bar">
  <button class="plat-btn on" onclick="setPlatform('fb',this)">📘 فيسبوك</button>
  <button class="plat-btn" onclick="setPlatform('ig',this)">📸 انستغرام</button>
  <button class="plat-btn" onclick="setPlatform('tt',this)">🎵 تيك توك</button>
</div>

<!-- DAYS -->
<div class="days-bar" id="daysBar">
  <button class="day-btn on" onclick="setDay(0,this)">الأحد</button>
  <button class="day-btn" onclick="setDay(1,this)">الإثنين</button>
  <button class="day-btn" onclick="setDay(2,this)">الثلاثاء</button>
  <button class="day-btn" onclick="setDay(3,this)">الأربعاء</button>
  <button class="day-btn" onclick="setDay(4,this)">الخميس</button>
  <button class="day-btn" onclick="setDay(5,this)">الجمعة</button>
  <button class="day-btn" onclick="setDay(6,this)">السبت</button>
</div>

<div class="main" id="main"></div>

<script>
let curPlatform='fb', curDay=0;

// ════ POST DATA ════
const POSTS=[
  // DAY 0: الأحد — BMI Infographic
  {
    day:'الأحد',
    theme:'معلومات صحية',
    color:'dark',
    caption:{
      fb:`🔬 هل تعرف مؤشر كتلة جسمك؟

مؤشر BMI هو أول خطوة لمعرفة وضعك الصحي الحقيقي 👇

✅ أقل من 18.5 = نقص وزن
✅ 18.5 – 24.9 = وزن مثالي
⚠️ 25 – 29.9 = زيادة طفيفة
🔴 30+ = سمنة تحتاج تدخل

كيف تحسب BMI؟
الوزن ÷ (الطول × الطول) بالمتر

مثال: شخص وزنه 80كغ وطوله 1.75 متر
80 ÷ (1.75×1.75) = 26.1 ← زيادة طفيفة

💡 تطبيقنا يحسبها تلقائياً ويبني لك خطة كاملة!
👉 احصل على تحليلك المجاني الآن

#صحة #رياضة #BMI #نظام_غذائي`,
      ig:`🔬 BMI — أول خطوة لتحقيق هدفك الصحي

معرفة مؤشر كتلة جسمك هي البداية الحقيقية 💪

اكشف تحليلك الكامل مجاناً 👆 الرابط في البايو

#صحة #لياقة #رجيم #BMI #تخسيس #بناء_عضلي #صحة_وعافية #رياضة`,
      tt:`💪 اعرف مؤشر جسمك في ثانية!
BMI أول خطوة لتغيير حياتك
احصل على خطتك الكاملة مجاناً
الرابط في البايو 🔗 #fitness #health #صحة #رجيم`
    },
    canvas:`
    <div class="post-canvas d1">
      <div class="d1-bg-img"></div>
      <div class="d1-content">
        <div>
          <div class="d1-badge">📊 معلومة صحية</div>
          <div class="d1-title" style="margin-top:10px">مؤشر كتلة<br>الجسم <span>BMI</span></div>
          <div style="font-size:.75rem;color:rgba(255,255,255,.6);margin-top:4px">دليلك لمعرفة وضعك الصحي الحقيقي</div>

// ════ RENDER ════
function render(){
  const post=POSTS[curDay];
  const cap=post.caption[curPlatform]||post.caption.fb;
  let html='';

  if(curPlatform==='fb'){
    html+=`<div class="frame-fb">
      <div class="fb-header">
        <div class="fb-avatar">AI</div>
        <div><div class="fb-name">AYACHI INFO Health Pro</div><div class="fb-time">الآن · 🌍</div></div>
      </div>
      ${post.canvas}
      <div style="padding:10px 14px 6px;font-size:.82rem;line-height:1.6;">${cap.split('\n').slice(0,3).join('<br>')}<span style="color:#2563EB;cursor:pointer"> ...المزيد</span></div>
      <div class="fb-reactions">
        <div class="fb-react">👍 أعجبني</div>
        <div class="fb-react">💬 تعليق</div>
        <div class="fb-react">↗️ مشاركة</div>
      </div>
    </div>`;
  } else if(curPlatform==='ig'){
    html+=`<div class="frame-ig">
      <div class="ig-header">
        <div class="ig-avatar"><div class="ig-avatar-inner">AI</div></div>
        <div class="ig-name">ayachi_info_health</div>
        <div class="ig-dots">•••</div>
      </div>
      ${post.canvas}
      <div class="ig-actions">
        <div class="ig-left">
          <span class="ig-icon">🤍</span>
          <span class="ig-icon">💬</span>
          <span class="ig-icon">📤</span>
        </div>
        <span class="ig-icon">🔖</span>
      </div>
      <div class="ig-likes">2,341 إعجاباً</div>
      <div class="ig-cap"><strong>ayachi_info_health</strong> ${cap.split('\n')[0]}</div>
      <div class="ig-tags">${cap.match(/#[^\s#]*/g)?.slice(0,5).join(' ')||''}</div>
    </div>`;
  } else if(curPlatform==='tt'){
    html+=`<div class="frame-tt">
      <div style="aspect-ratio:9/16;position:relative;overflow:hidden;">
        ${post.canvas.replace('class="post-canvas','class="post-canvas reel')}
        <div class="tt-side">
          <div class="tt-side-icon"><div class="tt-avatar" style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--g2),var(--g));display:flex;align-items:center;justify-content:center;color:#fff;font-size:.7rem;font-weight:900;border:2px solid #fff">AI</div></div>
          <div class="tt-side-icon"><div class="tt-side-em">❤️</div><div class="tt-side-n">48.2K</div></div>
          <div class="tt-side-icon"><div class="tt-side-em">💬</div><div class="tt-side-n">1,203</div></div>
          <div class="tt-side-icon"><div class="tt-side-em">↗️</div><div class="tt-side-n">8,741</div></div>
          <div class="tt-side-icon"><div class="tt-side-em">🎵</div></div>
        </div>
        <div class="tt-bottom">
          <div class="tt-user">@ayachi_info_health</div>
          <div class="tt-desc">${cap.split('\n').slice(0,2).join(' ')}</div>
          <div class="tt-music">🎵 صوت أصلي — AYACHI INFO</div>
        </div>
      </div>
    </div>`;
  }

  html+=`<div class="gap"></div>`;

  html+=`<div class="caption-box">
    <div class="cap-header">
      <div class="cap-title">📝 نص المنشور — ${post.day} (${post.theme})</div>
      <button class="copy-btn" onclick="copyCaption(this,'${curDay}')">📋 نسخ</button>
    </div>
    <div class="cap-text">${cap}</div>
  </div>`;

  html+=`<div class="gap"></div>`;

  const tips={
    fb:'📘 أفضل وقت للنشر: 7-9 صباحاً أو 7-9 مساءً\nاستخدم 3-5 هاشتاق فقط في فيسبوك\nاضغط زر "احصل على خطتك" واربطه بالتطبيق',
    ig:'📸 أفضل وقت: 12-2 ظهراً أو 5-7 مساءً\nاستخدم 10-20 هاشتاق\nاذكر "الرابط في البايو" في كل منشور',

  document.getElementById('main').innerHTML=`<div class="post-wrap on">${html}</div>`;
}

function copyCaption(btn, dayIdx){
  const cap=POSTS[dayIdx].caption[curPlatform];
  navigator.clipboard.writeText(cap).then(()=>{
    btn.textContent='✅ تم النسخ!';
    btn.style.background='var(--g)';btn.style.color='#fff';
    setTimeout(()=>{btn.textContent='📋 نسخ';btn.style.background='';btn.style.color='';},2000);
  }).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=cap;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    btn.textContent='✅ تم النسخ!';setTimeout(()=>btn.textContent='📋 نسخ',2000);
  });
}

function downloadPost(){
  const canvas=document.querySelector('.post-canvas');
  if(!canvas)return;
  // HTML2Canvas fallback instruction
  alert('💡 لتحميل الصورة:\n1. خذ screenshot للتصميم\n2. أو استخدم متصفح سطح المكتب → Print → Save as PDF\n\nملاحظة: تحميل PNG مباشر يتطلب مكتبة html2canvas على سيرفر.');
}

function setPlatform(p,btn){
  curPlatform=p;
  document.querySelectorAll('.plat-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function setDay(d,btn){
  curDay=d;
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

render();
</script>
