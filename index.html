<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AYACHI INFO Health Pro – مستشارك الصحي الذكي</title>
<meta name="description" content="خطة صحية مخصصة 100% – غذاء + تمارين + إرسال فوري لإيميلك">
<meta name="theme-color" content="#FFFFFF">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --g:#059652;--g2:#047A42;--g3:#E8F7EF;
  --ink:#0D1B2A;--sub:#4A5568;--line:#E2E8F0;
  --bg:#FFFFFF;--bg2:#F8FAFC;
  --orange:#E85D2F;--gold:#D4970A;
  --serif:'Georgia',serif;--sans:'Tahoma','Segoe UI',Arial,sans-serif;
}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);overflow-x:hidden;}
img{display:block;max-width:100%;}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;
  background:rgba(255,255,255,.94);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--line);
  box-shadow:0 1px 16px rgba(0,0,0,.06);
}
.nav-brand{font-size:.75rem;font-weight:900;color:var(--g);letter-spacing:2.5px;text-transform:uppercase;}
.lang-btns{display:flex;gap:4px;}
.lang-btn{padding:5px 11px;border-radius:20px;border:1px solid var(--line);background:none;color:var(--sub);font-size:.7rem;font-weight:700;cursor:pointer;transition:.15s;}
.lang-btn.active{background:var(--g);color:#fff;border-color:var(--g);}

/* ── HERO ── */
.hero{
  min-height:100vh;
  display:grid;grid-template-columns:1fr;
  position:relative;overflow:hidden;
  padding-top:56px;
}
.hero-img{
  position:absolute;inset:0;
  background:url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1200&q=80') center/cover no-repeat;
}
.hero-img::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(5,150,82,.88) 0%,rgba(4,60,30,.75) 100%);
}
.hero-inner{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:60px 24px 48px;
  min-height:calc(100vh - 56px);
}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:#fff;font-size:.7rem;font-weight:800;letter-spacing:2px;
  padding:5px 14px;border-radius:30px;margin-bottom:20px;text-transform:uppercase;
  backdrop-filter:blur(4px);
}
.hero-badge span{width:7px;height:7px;border-radius:50%;background:#7FFFC4;display:inline-block;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.hero-title{
  font-family:var(--serif);
  font-size:clamp(2.4rem,8vw,4.2rem);
  font-weight:900;line-height:1.1;
  color:#fff;letter-spacing:-1px;margin-bottom:16px;
}
.hero-title em{font-style:italic;color:#7FFFC4;}
.hero-sub{font-size:.95rem;color:rgba(255,255,255,.8);max-width:420px;margin:0 auto 32px;line-height:1.7;}
.hero-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:36px;}
.btn-w{
  background:#fff;color:var(--g);border:none;
  padding:14px 30px;border-radius:30px;font-size:.95rem;font-weight:900;
  cursor:pointer;text-decoration:none;display:inline-block;transition:.2s;
  box-shadow:0 4px 20px rgba(0,0,0,.2);
}
.btn-w:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3);}
.btn-ghost{
  background:rgba(255,255,255,.12);color:#fff;
  border:1px solid rgba(255,255,255,.35);
  padding:14px 26px;border-radius:30px;font-size:.9rem;font-weight:700;
  cursor:pointer;text-decoration:none;display:inline-block;transition:.2s;
  backdrop-filter:blur(4px);
}
.btn-ghost:hover{background:rgba(255,255,255,.2);}
.hero-trust{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
.trust-item{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.75);font-size:.78rem;}
.trust-icon{font-size:1rem;}

/* ── STATS BAND ── */
.stats-band{
  display:grid;grid-template-columns:repeat(3,1fr);
  background:var(--g);
}
.sband-item{
  text-align:center;padding:22px 12px;
  border-left:1px solid rgba(255,255,255,.15);
}
.sband-item:last-child{border-left:none;}
.sband-num{font-family:var(--serif);font-size:2rem;font-weight:900;color:#fff;line-height:1;}
.sband-lbl{font-size:.72rem;color:rgba(255,255,255,.75);margin-top:4px;}

/* ── SECTION SHARED ── */
.sec{padding:56px 20px;}
.sec-inner{max-width:680px;margin:0 auto;}
.sec-eye{font-size:.68rem;font-weight:900;letter-spacing:2px;color:var(--g);text-transform:uppercase;margin-bottom:8px;}
.sec-title{font-family:var(--serif);font-size:clamp(1.6rem,5vw,2.3rem);font-weight:900;line-height:1.2;margin-bottom:10px;}
.sec-title em{font-style:italic;color:var(--g);}
.sec-sub{font-size:.9rem;color:var(--sub);line-height:1.65;margin-bottom:28px;}
.alt-bg{background:var(--bg2);}
.green-bg{background:var(--g3);}

/* ── ATHLETE STRIP ── */
.athlete-strip{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:3px;height:240px;overflow:hidden;
}
.ath-img{
  background-size:cover;background-position:center;
  position:relative;overflow:hidden;
}
.ath-img::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 40%,rgba(5,150,82,.7));
}
.ath-label{
  position:absolute;bottom:10px;left:0;right:0;
  text-align:center;color:#fff;font-size:.72rem;font-weight:800;
  z-index:2;letter-spacing:1px;text-transform:uppercase;
}

/* ── HOW ── */
.steps{display:flex;flex-direction:column;gap:0;}
.step{
  display:flex;gap:16px;align-items:flex-start;
  padding:20px 0;border-bottom:1px solid var(--line);
}
.step:last-child{border-bottom:none;}
.step-num{
  width:36px;height:36px;flex-shrink:0;border-radius:10px;
  background:var(--g);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;font-weight:900;
}
.step-title{font-size:.95rem;font-weight:800;margin-bottom:3px;}
.step-desc{font-size:.82rem;color:var(--sub);line-height:1.55;}

/* ── SPLIT: image + content ── */
.split{display:grid;grid-template-columns:1fr;gap:0;}
.split-img{
  height:260px;background-size:cover;background-position:center;
  position:relative;
}
.split-img-overlay{
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(5,150,82,.4),rgba(4,60,30,.3));
}
.split-content{padding:32px 20px;}

/* ── FEATURES ── */
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.feat-card{
  background:#fff;border:1px solid var(--line);border-radius:14px;
  padding:16px 14px;transition:.2s;
}
.feat-card:hover{border-color:rgba(5,150,82,.35);box-shadow:0 4px 20px rgba(5,150,82,.08);}
.feat-em{font-size:1.6rem;margin-bottom:8px;display:block;}
.feat-t{font-size:.85rem;font-weight:800;margin-bottom:3px;}
.feat-d{font-size:.75rem;color:var(--sub);line-height:1.5;}

/* ── RESULTS PHOTO ── */
.results-section{position:relative;overflow:hidden;}
.results-photo{
  width:100%;height:220px;
  background:url('https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=900&q=80') center/cover;
  position:relative;
}
.results-photo::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(5,150,82,.85),rgba(4,40,20,.6));
}
.results-photo-text{
  position:absolute;inset:0;z-index:2;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:20px;
}
.results-photo-title{font-family:var(--serif);font-size:1.5rem;font-weight:900;color:#fff;margin-bottom:6px;}
.results-photo-sub{font-size:.82rem;color:rgba(255,255,255,.8);}

/* ── BA CARDS ── */
.ba-card{
  background:#fff;border:1px solid var(--line);border-radius:14px;
  padding:20px;margin-bottom:10px;
  display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;
}
.ba-side{text-align:center;}
.ba-lbl{font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub);margin-bottom:5px;}
.ba-val{font-family:var(--serif);font-size:1.8rem;font-weight:900;}
.ba-val.b{color:var(--orange);}
.ba-val.a{color:var(--g);}
.ba-arrow{font-size:1.3rem;color:var(--g);}
.ba-foot{font-size:.78rem;color:var(--sub);text-align:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--line);}
.ba-tag{display:inline-block;background:var(--g3);border:1px solid rgba(5,150,82,.25);color:var(--g);font-size:.68rem;font-weight:700;padding:2px 9px;border-radius:20px;}

/* ── TRAINER CARDS ── */
.trainer-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.trainer-card{border-radius:14px;overflow:hidden;position:relative;height:200px;}
.trainer-card img{width:100%;height:100%;object-fit:cover;}
.trainer-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 40%,rgba(5,50,25,.85));
}
.trainer-info{position:absolute;bottom:12px;left:12px;right:12px;z-index:2;color:#fff;}
.trainer-name{font-size:.88rem;font-weight:900;}
.trainer-role{font-size:.72rem;color:rgba(255,255,255,.75);}

/* ── TESTIMONIALS ── */
.testi-grid{display:flex;flex-direction:column;gap:10px;}
.testi-card{
  background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;
  display:flex;gap:14px;align-items:flex-start;
}
.testi-avatar{
  width:44px;height:44px;flex-shrink:0;border-radius:50%;
  overflow:hidden;border:2px solid var(--g3);
}
.testi-avatar img{width:100%;height:100%;object-fit:cover;}
.testi-body{}
.stars{color:var(--gold);font-size:.8rem;margin-bottom:5px;}
.testi-text{font-size:.85rem;line-height:1.65;color:#334155;margin-bottom:8px;}
.testi-name{font-size:.8rem;font-weight:800;}
.testi-info2{font-size:.72rem;color:var(--sub);}

/* ── PRICING ── */
.pricing-grid{display:flex;flex-direction:column;gap:12px;}
.price-card{
  background:#fff;border:2px solid var(--line);border-radius:18px;padding:22px 20px;
  position:relative;overflow:hidden;transition:.2s;
}
.price-card:hover{box-shadow:0 8px 30px rgba(0,0,0,.08);}
.price-card.featured{border-color:var(--g);background:linear-gradient(160deg,#EAF7F0,#fff);}
.price-card.featured::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--g2),var(--g));
}
.price-badge{
  display:inline-block;
  background:linear-gradient(135deg,var(--orange),var(--gold));
  color:#fff;font-size:.65rem;font-weight:900;
  padding:3px 10px;border-radius:20px;letter-spacing:.5px;margin-bottom:10px;
}
.price-name{font-size:1.05rem;font-weight:900;margin-bottom:3px;}
.price-desc{font-size:.8rem;color:var(--sub);margin-bottom:14px;}
.price-val{display:flex;align-items:baseline;gap:5px;margin-bottom:16px;}
.price-num{font-family:var(--serif);font-size:2.8rem;font-weight:900;color:var(--g);line-height:1;}
.price-cur{font-size:.85rem;color:var(--sub);}
.price-per{font-size:.75rem;color:var(--sub);}
.price-feats{list-style:none;margin-bottom:18px;}
.price-feats li{font-size:.82rem;padding:4px 0;display:flex;align-items:center;gap:7px;color:#475569;border-bottom:1px solid var(--line);}
.price-feats li:last-child{border:none;}
.price-feats .ck{color:var(--g);font-weight:900;}
.price-btn{width:100%;padding:13px;border:none;border-radius:25px;font-size:.9rem;font-weight:900;cursor:pointer;text-decoration:none;display:block;text-align:center;transition:.2s;}
.btn-outline{background:none;border:2px solid var(--line);color:var(--ink);}
.btn-outline:hover{border-color:var(--g);color:var(--g);}
.btn-solid{background:linear-gradient(135deg,var(--g2),var(--g));color:#fff;box-shadow:0 4px 18px rgba(5,150,82,.25);}
.btn-solid:hover{box-shadow:0 6px 28px rgba(5,150,82,.4);}

/* ── GUARANTEE ── */
.guar-box{
  background:var(--g3);border:1px solid rgba(5,150,82,.2);border-radius:14px;
  padding:18px;display:flex;gap:12px;align-items:flex-start;margin-top:12px;
}
.guar-icon{font-size:1.8rem;flex-shrink:0;}
.guar-title{font-size:.88rem;font-weight:800;margin-bottom:3px;}
.guar-desc{font-size:.78rem;color:var(--sub);line-height:1.5;}

/* ── FAQ ── */
.faq-item{border-bottom:1px solid var(--line);padding:16px 0;}
.faq-q{
  font-size:.9rem;font-weight:800;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  margin-bottom:0;
}
.faq-icon{color:var(--g);font-size:1.2rem;flex-shrink:0;transition:.2s;font-weight:400;}
.faq-a{font-size:.84rem;color:var(--sub);line-height:1.6;display:none;padding-top:10px;}
.faq-item.open .faq-a{display:block;}
.faq-item.open .faq-icon{transform:rotate(45deg);}

/* ── FINAL CTA ── */
.final-cta{
  position:relative;overflow:hidden;
  min-height:280px;display:flex;align-items:center;justify-content:center;
  text-align:center;padding:56px 24px;
}
.final-cta-bg{
  position:absolute;inset:0;
  background:url('https://images.unsplash.com/photo-1526506118085-60ce8714f8c5?w=1200&q=80') center/cover no-repeat;
}
.final-cta-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(5,150,82,.92),rgba(4,40,20,.88));}
.final-cta-inner{position:relative;z-index:2;max-width:480px;}
.final-cta-title{font-family:var(--serif);font-size:clamp(1.8rem,6vw,2.8rem);font-weight:900;color:#fff;margin-bottom:12px;}
.final-cta-title em{font-style:italic;color:#7FFFC4;}
.final-cta-sub{font-size:.9rem;color:rgba(255,255,255,.8);margin-bottom:28px;line-height:1.65;}

/* ── FOOTER ── */
footer{background:#F0F4F8;border-top:1px solid var(--line);padding:24px 20px;text-align:center;}
.foot-brand{font-size:.75rem;font-weight:900;color:var(--g);letter-spacing:2px;margin-bottom:5px;}
.foot-copy{font-size:.7rem;color:var(--sub);}

/* ── HB DIVIDER ── */
.hb{width:100%;height:48px;overflow:hidden;background:inherit;}
.hb svg{width:100%;height:100%;}
.hb-p{stroke:var(--g);stroke-width:1.5;fill:none;stroke-dasharray:1200;stroke-dashoffset:1200;animation:drawHB 2.5s ease forwards;}
@keyframes drawHB{to{stroke-dashoffset:0;}}

/* ── FLOAT ── */
.float-btn{
  position:fixed;bottom:18px;z-index:100;
  background:linear-gradient(135deg,var(--g2),var(--g));
  color:#fff;font-size:.8rem;font-weight:900;
  padding:11px 18px;border-radius:30px;
  box-shadow:0 4px 20px rgba(5,150,82,.4);
  text-decoration:none;animation:bob 3s ease-in-out infinite;
}
[dir="rtl"] .float-btn{left:16px;}
[dir="ltr"] .float-btn{right:16px;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}

/* ── REVEAL ── */
.rv{opacity:0;transform:translateY(20px);transition:opacity .55s ease,transform .55s ease;}
.rv.vis{opacity:1;transform:translateY(0);}

/* ── SEP ── */
.sep{width:100%;height:1px;background:var(--line);}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-brand">AYACHI INFO • Health Pro</div>
  <div class="lang-btns">
    <button class="lang-btn active" onclick="L('ar')">🇩🇿 AR</button>
    <button class="lang-btn" onclick="L('en')">🇬🇧 EN</button>
    <button class="lang-btn" onclick="L('fr')">🇫🇷 FR</button>
  </div>
</nav>

<!-- FLOAT -->
<a class="float-btn" id="floatBtn" href="#pricing"></a>

<!-- ══ HERO ══ -->
<section class="hero">
  <div class="hero-img"></div>
  <div class="hero-inner">
    <div class="hero-badge"><span></span> <span id="hBadge"></span></div>
    <h1 class="hero-title" id="hTitle"></h1>
    <p class="hero-sub" id="hSub"></p>
    <div class="hero-btns">
      <a class="btn-w" id="hCta1" href="#pricing"></a>
      <a class="btn-ghost" id="hCta2" href="#how"></a>
    </div>
    <div class="hero-trust" id="hTrust"></div>
  </div>
</section>

<!-- STATS BAND -->
<div class="stats-band rv" id="statsBand"></div>

<!-- ══ ATHLETE STRIP ══ -->
<div class="athlete-strip rv">
  <div class="ath-img" style="background-image:url('https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?w=600&q=80')">
    <div class="ath-label" id="athL1"></div>
  </div>
  <div class="ath-img" style="background-image:url('https://images.unsplash.com/photo-1518310383802-640c2de311b2?w=600&q=80')">
    <div class="ath-label" id="athL2"></div>
  </div>
  <div class="ath-img" style="background-image:url('https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=600&q=80')">
    <div class="ath-label" id="athL3"></div>
  </div>
</div>

<!-- ══ HOW IT WORKS ══ -->
<section class="sec alt-bg rv" id="how">
  <div class="sec-inner">
    <div class="sec-eye" id="howEye"></div>
    <h2 class="sec-title" id="howTitle"></h2>
    <p class="sec-sub" id="howSub"></p>
    <div class="steps" id="stepsEl"></div>
  </div>
</section>

<!-- ══ SPLIT: WOMAN RUNNING ══ -->
<div class="split rv">
  <div class="split-img" style="background-image:url('https://images.unsplash.com/photo-1552674605-db6ffd4facb5?w=900&q=80')">
    <div class="split-img-overlay"></div>
  </div>
  <div class="split-content sec-inner">
    <div class="sec-eye" id="featEye"></div>
    <h2 class="sec-title" id="featTitle"></h2>
    <p class="sec-sub" id="featSub"></p>
    <div class="feat-grid" id="featGrid"></div>

</div>

<!-- ══ RESULTS ══ -->
<section class="results-section rv">
  <div class="results-photo">
    <div class="results-photo::after"></div>
    <div class="results-photo-text">
      <div class="results-photo-title" id="resPhotoTitle"></div>
      <div class="results-photo-sub" id="resPhotoSub"></div>
    </div>
  </div>
  <div class="sec alt-bg">
    <div class="sec-inner">
      <div id="baContainer"></div>
    </div>
  </div>
</section>

<!-- ══ TRAINER SHOWCASE ══ -->
<section class="sec rv">
  <div class="sec-inner">
    <div class="sec-eye" id="trainEye"></div>
    <h2 class="sec-title" id="trainTitle"></h2>
    <p class="sec-sub" id="trainSub"></p>
    <div class="trainer-grid">
      <div class="trainer-card">
        <img src="https://images.unsplash.com/photo-1526506118085-60ce8714f8c5?w=400&q=80" alt="athlete" loading="lazy">
        <div class="trainer-info"><div class="trainer-name" id="tr1n"></div><div class="trainer-role" id="tr1r"></div></div>
      </div>
      <div class="trainer-card">
        <img src="https://images.unsplash.com/photo-1579758629938-03607ccdbaba?w=400&q=80" alt="athlete" loading="lazy">
        <div class="trainer-info"><div class="trainer-name" id="tr2n"></div><div class="trainer-role" id="tr2r"></div></div>
      </div>
      <div class="trainer-card">
        <img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=400&q=80" alt="athlete" loading="lazy">
        <div class="trainer-info"><div class="trainer-name" id="tr3n"></div><div class="trainer-role" id="tr3r"></div></div>
      </div>
      <div class="trainer-card">
        <img src="https://images.unsplash.com/photo-1616803689943-5601631c7fec?w=400&q=80" alt="athlete" loading="lazy">
        <div class="trainer-info"><div class="trainer-name" id="tr4n"></div><div class="trainer-role" id="tr4r"></div></div>
      </div>
    </div>
  </div>
</section>

<!-- ══ HB ══ -->
<div class="hb" style="background:var(--bg2);">
  <svg viewBox="0 0 800 48" preserveAspectRatio="none">
    <path class="hb-p" d="M0,24 L180,24 L210,6 L228,42 L246,10 L264,38 L280,24 L800,24"/>

  document.getElementById('resPhotoTitle').textContent=t.resPhotoTitle;
  document.getElementById('resPhotoSub').textContent=t.resPhotoSub;
  document.getElementById('baContainer').innerHTML=t.results.map(r=>`
    <div class="ba-card">
      <div class="ba-side"><div class="ba-lbl">${t.bef}</div><div class="ba-val b">${r.b}</div></div>
      <div class="ba-arrow">→</div>
      <div class="ba-side"><div class="ba-lbl">${t.aft}</div><div class="ba-val a">${r.a}</div></div>
    </div>
    <div class="ba-foot">${r.n} <span class="ba-tag">${r.tag}</span></div>
  `).join('');

  // Trainers
  document.getElementById('trainEye').textContent=t.trainEye;
  document.getElementById('trainTitle').innerHTML=t.trainTitle;
  document.getElementById('trainSub').textContent=t.trainSub;
  t.trainers.forEach((tr,i)=>{
    document.getElementById('tr'+(i+1)+'n').textContent=tr.n;
    document.getElementById('tr'+(i+1)+'r').textContent=tr.r;
  });

  // Testimonials
  document.getElementById('testiEye').textContent=t.testiEye;
  document.getElementById('testiTitle').innerHTML=t.testiTitle;
  document.getElementById('testiGrid').innerHTML=t.testis.map(ts=>`
    <div class="testi-card">
      <div class="testi-avatar"><img src="${ts.av}" alt="${ts.n}" loading="lazy"></div>
      <div class="testi-body">
        <div class="stars">${ts.stars}</div>
        <div class="testi-text">${ts.text}</div>
        <div class="testi-name">${ts.n}</div>
        <div class="testi-info2">${ts.i}</div>
      </div>
    </div>`).join('');

  // Pricing
  document.getElementById('priceEye').textContent=t.priceEye;
  document.getElementById('priceTitle').innerHTML=t.priceTitle;
  document.getElementById('priceSub').textContent=t.priceSub;
  document.getElementById('pricingGrid').innerHTML=t.plans.map(p=>`
    <div class="price-card ${p.f?'featured':''}">
      ${p.badge?`<div class="price-badge">${p.badge}</div>`:''}
      <div class="price-name">${p.name}</div>
      <div class="price-desc">${p.desc}</div>
      <div class="price-val">
        <div class="price-num">${p.price}</div>
        <div><div class="price-cur">${p.cur}</div><div class="price-per">${p.per}</div></div>
      </div>
      <ul class="price-feats">${p.feats.map(f=>`<li><span class="ck">✓</span>${f}</li>`).join('')}</ul>
      <a href="مستشارك_الصحي_الذكي.html" class="price-btn ${p.f?'btn-solid':'btn-outline'}">${p.btn}</a>
    </div>`).join('');

  document.getElementById('guarTitle').textContent=t.guarTitle;
  document.getElementById('guarDesc').textContent=t.guarDesc;

  // FAQ
  document.getElementById('faqEye').textContent=t.faqEye;
  document.getElementById('faqTitle').innerHTML=t.faqTitle;
  document.getElementById('faqEl').innerHTML=t.faqs.map(f=>`
    <div class="faq-item" onclick="this.classList.toggle('open')">
      <div class="faq-q">${f.q}<span class="faq-icon">+</span></div>
      <div class="faq-a">${f.a}</div>
    </div>`).join('');

  // Final
  document.getElementById('finalTitle').innerHTML=t.finalTitle;
  document.getElementById('finalSub').textContent=t.finalSub;
  document.getElementById('finalCta').textContent=t.finalCta;
  document.getElementById('footCopy').textContent=t.foot;
}

render();

// Scroll reveal
const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis');});
},{threshold:.08});
document.querySelectorAll('.rv').forEach(el=>obs.observe(el));
</script>
</body>
</html>
