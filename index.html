<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AYACHI INFO Health Pro – مستشارك الصحي الذكي</title>
<meta name="description" content="خطة صحية مخصصة 100% – غذاء + تمارين + إرسال فوري لإيميلك">
<meta name="theme-color" content="#047A42">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --g:#047A42;--g2:#059652;--g3:#E8F7EF;--g4:#D1FAE5;
  --ink:#0D1B2A;--sub:#4A5568;--line:#E2E8F0;
  --bg:#FFFFFF;--bg2:#F8FAFC;
  --orange:#E85D2F;--gold:#D4970A;--gold2:#FEF3C7;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'Cairo','Segoe UI',Arial,sans-serif;
}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);overflow-x:hidden;line-height:1.6;}
img{display:block;max-width:100%;height:auto;}
a{text-decoration:none;}

/* ══ NAV ══ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 24px;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
  box-shadow:0 2px 20px rgba(0,0,0,.06);
}
.nav-brand{
  font-size:.8rem;font-weight:900;color:var(--g);
  letter-spacing:2px;text-transform:uppercase;
}
.lang-btns{display:flex;gap:4px;}
.lb{
  padding:5px 12px;border-radius:20px;
  border:1.5px solid var(--line);background:none;
  color:var(--sub);font-size:.7rem;font-weight:700;
  cursor:pointer;transition:.15s;font-family:var(--sans);
}
.lb.on{background:var(--g);color:#fff;border-color:var(--g);}

/* ══ HERO ══ */
.hero{
  min-height:100vh;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  padding-top:60px;
}
.hero-bg{
  position:absolute;inset:0;
  background:url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=1400&q=90') center/cover no-repeat;
}
.hero-bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(150deg,rgba(4,122,66,.92) 0%,rgba(3,50,25,.82) 60%,rgba(2,30,15,.9) 100%);
}
.hero-inner{
  position:relative;z-index:2;
  max-width:780px;width:100%;
  padding:60px 28px 60px;
  text-align:center;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.25);
  color:#fff;font-size:.72rem;font-weight:700;
  padding:6px 18px;border-radius:30px;
  margin-bottom:28px;letter-spacing:1px;
  backdrop-filter:blur(8px);
}
.badge-dot{
  width:8px;height:8px;border-radius:50%;
  background:#7FFFC4;animation:pulse 1.5s infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}
.hero-title{
  font-family:var(--serif);
  font-size:clamp(2.6rem,7vw,4.8rem);
  font-weight:900;line-height:1.1;
  color:#fff;letter-spacing:-1px;
  margin-bottom:20px;
}
.hero-title em{font-style:italic;color:#7FFFC4;}
.hero-sub{
  font-size:1rem;color:rgba(255,255,255,.82);
  max-width:500px;margin:0 auto 36px;
  line-height:1.75;font-weight:400;
}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;}
.btn-primary{
  background:#fff;color:var(--g);
  padding:15px 36px;border-radius:40px;
  font-size:.95rem;font-weight:700;
  border:none;cursor:pointer;
  text-decoration:none;display:inline-block;
  box-shadow:0 6px 24px rgba(0,0,0,.2);
  transition:.2s;font-family:var(--sans);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,0,0,.3);}
.btn-ghost{
  background:rgba(255,255,255,.1);color:#fff;
  border:1.5px solid rgba(255,255,255,.3);
  padding:15px 28px;border-radius:40px;
  font-size:.9rem;font-weight:600;
  cursor:pointer;text-decoration:none;display:inline-block;
  transition:.2s;backdrop-filter:blur(6px);
  font-family:var(--sans);
}
.btn-ghost:hover{background:rgba(255,255,255,.18);}
.hero-trust{
  display:flex;gap:24px;justify-content:center;flex-wrap:wrap;
}
.trust-item{
  display:flex;align-items:center;gap:6px;
  color:rgba(255,255,255,.72);font-size:.8rem;font-weight:500;
}

/* ══ STATS ══ */
.stats-band{
  display:grid;grid-template-columns:repeat(3,1fr);
  background:var(--g);
}
.sband-item{
  text-align:center;padding:24px 12px;
  border-inline-start:1px solid rgba(255,255,255,.15);
}
.sband-item:last-child{border-inline-start:none;}
.sband-num{
  font-family:var(--serif);font-size:2.2rem;
  font-weight:900;color:#fff;line-height:1;
}
.sband-lbl{font-size:.74rem;color:rgba(255,255,255,.75);margin-top:4px;font-weight:500;}

/* ══ SECTION ══ */
.sec{padding:64px 24px;}
.sec.alt{background:var(--bg2);}
.sec.green{background:var(--g3);}
.inner{max-width:700px;margin:0 auto;}
.eyebrow{
  font-size:.68rem;font-weight:700;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--g);margin-bottom:10px;
}
.sec-title{
  font-family:var(--serif);
  font-size:clamp(1.8rem,4.5vw,2.6rem);
  font-weight:900;line-height:1.2;margin-bottom:12px;
}
.sec-title em{font-style:italic;color:var(--g);}
.sec-sub{font-size:.9rem;color:var(--sub);line-height:1.7;margin-bottom:32px;font-weight:400;}

/* ══ ATHLETE STRIP ══ */
.ath-strip{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:3px;height:260px;overflow:hidden;
}
.ath-img{background-size:cover;background-position:center;position:relative;}
.ath-img::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 45%,rgba(4,122,66,.75));
}
.ath-lbl{
  position:absolute;bottom:10px;left:0;right:0;
  text-align:center;color:#fff;font-size:.7rem;font-weight:700;
  z-index:2;letter-spacing:1px;text-transform:uppercase;
}

/* ══ STEPS ══ */
.steps{display:flex;flex-direction:column;}
.step{
  display:flex;gap:16px;align-items:flex-start;
  padding:22px 0;border-bottom:1px solid var(--line);
}
.step:last-child{border-bottom:none;}
.step-num{
  width:38px;height:38px;flex-shrink:0;border-radius:12px;
  background:var(--g);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:.78rem;font-weight:800;letter-spacing:.5px;
}
.step-title{font-size:.95rem;font-weight:700;margin-bottom:3px;}
.step-desc{font-size:.82rem;color:var(--sub);line-height:1.55;font-weight:400;}

/* ══ FEATURES ══ */
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.feat-card{
  background:#fff;border:1.5px solid var(--line);
  border-radius:16px;padding:18px 16px;transition:.2s;
}
.feat-card:hover{border-color:var(--g);box-shadow:0 4px 20px rgba(4,122,66,.08);transform:translateY(-2px);}
.feat-em{font-size:1.7rem;margin-bottom:10px;display:block;}
.feat-t{font-size:.85rem;font-weight:700;margin-bottom:4px;}
.feat-d{font-size:.76rem;color:var(--sub);line-height:1.5;font-weight:400;}

/* ══ SPLIT ══ */
.split{display:grid;grid-template-columns:1fr;}
.split-img{height:280px;background-size:cover;background-position:center;position:relative;}
.split-img::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(4,122,66,.35),rgba(3,50,25,.25));}
.split-body{padding:36px 24px;}

/* ══ RESULTS ══ */
.res-photo{
  width:100%;height:230px;position:relative;overflow:hidden;
  background:url('https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=1000&q=80') center/cover;
}
.res-photo::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(4,122,66,.88),rgba(3,40,20,.7));}
.res-photo-txt{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
.res-photo-t{font-family:var(--serif);font-size:1.6rem;font-weight:900;color:#fff;margin-bottom:6px;}
.res-photo-s{font-size:.84rem;color:rgba(255,255,255,.8);font-weight:400;}

/* ══ BA CARDS ══ */
.ba-wrap{display:flex;flex-direction:column;gap:12px;}
.ba-card{
  background:#fff;border:1.5px solid var(--line);border-radius:16px;
  padding:22px;direction:ltr;
  display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center;
}
.ba-side{text-align:center;}
.ba-lbl{font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub);margin-bottom:6px;font-weight:600;}
.ba-val{font-family:var(--serif);font-size:2rem;font-weight:900;}
.ba-val.b{color:var(--orange);}
.ba-val.a{color:var(--g);}
.ba-arr{color:var(--g);font-size:1.5rem;line-height:1;}
.ba-foot{font-size:.78rem;color:var(--sub);text-align:center;padding-top:12px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:center;gap:8px;}
.ba-tag{background:var(--g3);border:1px solid rgba(4,122,66,.2);color:var(--g);font-size:.64rem;font-weight:700;padding:2px 10px;border-radius:10px;}

/* ══ TRAINERS ══ */
.trainer-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.trainer-card{border-radius:16px;overflow:hidden;position:relative;height:210px;}
.trainer-card img{width:100%;height:100%;object-fit:cover;}
.trainer-card::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(3,40,20,.88));}
.trainer-info{position:absolute;bottom:14px;left:14px;right:14px;z-index:2;color:#fff;}
.trainer-name{font-size:.88rem;font-weight:700;}
.trainer-role{font-size:.7rem;color:rgba(255,255,255,.72);font-weight:400;}

/* ══ TESTIMONIALS ══ */
.testi-list{display:flex;flex-direction:column;gap:12px;}
.testi-card{
  background:#fff;border:1.5px solid var(--line);
  border-radius:16px;padding:20px;
}
.testi-head{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.testi-av{width:46px;height:46px;border-radius:50%;overflow:hidden;border:2px solid var(--g3);flex-shrink:0;}
.testi-av img{width:100%;height:100%;object-fit:cover;}
.stars{color:var(--gold);font-size:.8rem;margin-bottom:2px;}
.testi-nm{font-size:.82rem;font-weight:700;}
.testi-inf{font-size:.7rem;color:var(--sub);font-weight:400;}
.testi-txt{font-size:.85rem;line-height:1.65;color:#334155;font-weight:400;}

/* ══ PRICING ══ */
.pricing-wrap{display:flex;flex-direction:column;gap:14px;}

.price-card{
  background:#fff;border:2px solid var(--line);
  border-radius:20px;padding:24px 22px;
  position:relative;overflow:hidden;transition:.2s;
}
.price-card:hover{box-shadow:0 8px 32px rgba(0,0,0,.08);}
.price-card.feat{
  border-color:var(--g);
  background:linear-gradient(160deg,#EAF7F0 0%,#fff 50%);
}
.price-card.feat::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--g),var(--g2));
}
.price-hot{
  display:inline-block;
  background:linear-gradient(135deg,var(--orange),var(--gold));
  color:#fff;font-size:.65rem;font-weight:800;
  padding:4px 12px;border-radius:20px;margin-bottom:12px;
}
.price-name{font-size:1.1rem;font-weight:700;margin-bottom:4px;}
.price-desc{font-size:.8rem;color:var(--sub);margin-bottom:16px;font-weight:400;}
.price-val{display:flex;align-items:baseline;gap:6px;margin-bottom:8px;}
.price-num{font-family:var(--serif);font-size:3rem;font-weight:900;color:var(--g);line-height:1;}
.price-cur{font-size:.88rem;color:var(--sub);font-weight:500;}
.price-per{font-size:.76rem;color:var(--sub);font-weight:400;}
.price-feats{list-style:none;margin-bottom:20px;}
.price-feats li{font-size:.82rem;padding:5px 0;display:flex;align-items:center;gap:8px;color:#475569;border-bottom:1px solid var(--line);font-weight:400;}
.price-feats li:last-child{border:none;}
.price-feats .ck{color:var(--g);font-weight:800;}
.price-btn{
  width:100%;padding:14px;border:none;border-radius:30px;
  font-size:.92rem;font-weight:700;cursor:pointer;
  text-decoration:none;display:block;text-align:center;
  transition:.2s;font-family:var(--sans);
}
.btn-ol{background:none;border:2px solid var(--line);color:var(--ink);}
.btn-ol:hover{border-color:var(--g);color:var(--g);}
.btn-sl{
  background:linear-gradient(135deg,var(--g),var(--g2));
  color:#fff;box-shadow:0 4px 18px rgba(4,122,66,.28);
}
.btn-sl:hover{box-shadow:0 6px 28px rgba(4,122,66,.42);}

/* ══ GUARANTEE ══ */
.guar{
  background:var(--g3);border:1.5px solid rgba(4,122,66,.2);
  border-radius:16px;padding:20px;
  display:flex;gap:14px;align-items:flex-start;margin-top:14px;
}
.guar-em{font-size:1.8rem;flex-shrink:0;}
.guar-t{font-size:.9rem;font-weight:700;margin-bottom:3px;}
.guar-d{font-size:.8rem;color:var(--sub);line-height:1.55;font-weight:400;}

/* ══ FAQ ══ */
.faq-item{border-bottom:1px solid var(--line);padding:18px 0;}
.faq-q{
  font-size:.92rem;font-weight:700;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;gap:10px;
}
.faq-ic{color:var(--g);font-size:1.3rem;flex-shrink:0;transition:.22s;}
.faq-a{font-size:.85rem;color:var(--sub);line-height:1.65;display:none;padding-top:10px;font-weight:400;}
.faq-item.open .faq-a{display:block;}
.faq-item.open .faq-ic{transform:rotate(45deg);}

/* ══ FINAL CTA ══ */
.final-cta{
  position:relative;overflow:hidden;
  min-height:300px;display:flex;align-items:center;justify-content:center;
  text-align:center;padding:64px 28px;
}
.final-cta-bg{
  position:absolute;inset:0;
  background:url('https://images.unsplash.com/photo-1526506118085-60ce8714f8c5?w=1400&q=80') center/cover;
}
.final-cta-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(4,122,66,.93),rgba(3,40,20,.9));}
.final-inner{position:relative;z-index:2;max-width:520px;}
.final-title{font-family:var(--serif);font-size:clamp(2rem,6vw,3.2rem);font-weight:900;color:#fff;margin-bottom:14px;}
.final-title em{font-style:italic;color:#7FFFC4;}
.final-sub{font-size:.92rem;color:rgba(255,255,255,.8);margin-bottom:32px;line-height:1.7;font-weight:400;}

/* ══ FOOTER ══ */
footer{background:#F0F4F8;border-top:1px solid var(--line);padding:28px 24px;text-align:center;}
.foot-brand{font-size:.76rem;font-weight:700;color:var(--g);letter-spacing:2px;margin-bottom:6px;}
.foot-copy{font-size:.7rem;color:var(--sub);font-weight:400;}

/* ══ FLOAT ══ */
.float-btn{
  position:fixed;bottom:20px;z-index:400;
  background:linear-gradient(135deg,var(--g),var(--g2));
  color:#fff;font-size:.8rem;font-weight:700;
  padding:12px 22px;border-radius:30px;
  box-shadow:0 4px 20px rgba(4,122,66,.45);
  text-decoration:none;
  animation:bob 3s ease-in-out infinite;
}
[dir="rtl"] .float-btn{left:18px;}
[dir="ltr"] .float-btn{right:18px;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}

/* ══ HB ══ */
.hb{width:100%;height:50px;overflow:hidden;}
.hb svg{width:100%;height:100%;}
.hb-p{stroke:var(--g);stroke-width:1.5;fill:none;stroke-dasharray:1200;stroke-dashoffset:1200;animation:hba 2.8s ease forwards;}
@keyframes hba{to{stroke-dashoffset:0;}}

/* ══ REVEAL ══ */
.rv{opacity:0;transform:translateY(22px);transition:opacity .6s,transform .6s;}
.rv.vis{opacity:1;transform:translateY(0);}
.sep{height:1px;background:var(--line);}

/* ══ DESKTOP ══ */
@media(min-width:768px){
  nav{padding:12px 48px;}
  .nav-brand{font-size:.85rem;}
  .hero-inner{padding:80px 48px;}
  .hero-title{font-size:clamp(3.2rem,5vw,5.4rem);}
  .hero-sub{font-size:1.05rem;max-width:580px;}
  .btn-primary,.btn-ghost{padding:17px 40px;font-size:1rem;}
  .stats-band .sband-num{font-size:2.6rem;}
  .pay-methods{grid-template-columns:repeat(4,1fr);max-width:900px;}
  .sec{padding:80px 48px;}
  .inner{max-width:980px;}
  .sec-title{font-size:clamp(2.2rem,3.5vw,3rem);}
  .ath-strip{height:320px;}
  .steps{display:grid;grid-template-columns:1fr 1fr;column-gap:40px;}
  .feat-grid{grid-template-columns:repeat(3,1fr);gap:14px;}
  .split{grid-template-columns:1fr 1fr;}
  .split-img{height:auto;min-height:380px;}
  .ba-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .ba-ft-row{display:none;} /* hide footer in desktop ba — shown inline */
  .trainer-grid{grid-template-columns:repeat(4,1fr);}
  .trainer-card{height:260px;}
  .testi-list{display:grid;grid-template-columns:repeat(3,1fr);}
  .pricing-wrap{flex-direction:row;gap:20px;}
  .price-card{flex:1;}
  .price-num{font-size:3.4rem;}
  .final-title{font-size:clamp(2.4rem,4vw,3.6rem);}
  .final-sub{font-size:1rem;}
  .float-btn{padding:13px 26px;font-size:.85rem;}
}
@media(min-width:1100px){
  .inner{max-width:1100px;}
  .feat-grid{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">AYACHI INFO • Health Pro</div>
  <div class="lang-btns">
    <button class="lb on" onclick="L('ar')">🇩🇿 AR</button>
    <button class="lb" onclick="L('en')">🇬🇧 EN</button>
    <button class="lb" onclick="L('fr')">🇫🇷 FR</button>
  </div>
</nav>

<a class="float-btn" id="floatBtn" href="#pricing"></a>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-inner">
    <div class="hero-badge">
      <span class="badge-dot"></span>
      <span id="hBadge"></span>
    </div>
    <h1 class="hero-title" id="hTitle"></h1>
    <p class="hero-sub" id="hSub"></p>
    <div class="hero-btns">
      <a class="btn-primary" id="hCta1" href="https://elayachiauto-code.github.io/Hapitoslife/app.html"></a>
      <a class="btn-ghost" id="hCta2" href="#how"></a>
    </div>
    <div class="hero-trust" id="hTrust"></div>
  </div>
</section>

<!-- STATS -->
<div class="stats-band rv" id="statsBand"></div>

<!-- ATHLETE STRIP -->
<div class="ath-strip rv">
  <div class="ath-img" style="background-image:url('https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?w=600&q=80')">
    <div class="ath-lbl" id="athL1"></div>
  </div>
  <div class="ath-img" style="background-image:url('https://images.unsplash.com/photo-1518310383802-640c2de311b2?w=600&q=80')">
    <div class="ath-lbl" id="athL2"></div>
  </div>
  <div class="ath-img" style="background-image:url('https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=600&q=80')">
    <div class="ath-lbl" id="athL3"></div>
  </div>
</div>

<!-- HOW -->
<section class="sec alt rv" id="how">
  <div class="inner">
    <div class="eyebrow" id="howEye"></div>
    <h2 class="sec-title" id="howTitle"></h2>
    <p class="sec-sub" id="howSub"></p>
    <div class="steps" id="stepsEl"></div>
  </div>
</section>

<!-- SPLIT + FEATURES -->
<div class="split rv">
  <div class="split-img" style="background-image:url('https://images.unsplash.com/photo-1552674605-db6ffd4facb5?w=900&q=80')">
    <div class="split-img::after"></div>

     feats:['21 repas (7 jours)','7 séances complètes','Vidéos cuisine et sport','Analyse médicale complète','Conseils personnalisés','Livraison instantanée'],
     btn:'Obtenir maintenant',f:true}
  ],
  guarT:'Garantie remboursement 24 heures',guarD:'Pas satisfait ? Remboursement complet en 24h. Sans questions.',
  faqEye:'FAQ',faqTitle:'Une <em>question ?</em>',
  faqs:[
    {q:'Comment je reçois le programme ?',a:'Après paiement PayPal confirmé, votre plan est envoyé par email en moins dune minute.'},
    {q:'Puis-je payer avec Visa ou Mastercard ?',a:'Oui ! Via PayPal vous pouvez payer avec Visa ou Mastercard, même sans compte PayPal.'},
    {q:'Convient à tous les âges ?',a:'Oui, sadapte à votre âge, poids et santé. Pour les 14-70 ans.'},
    {q:'Fonctionne hors ligne ?',a:"L'app fonctionne hors ligne. Les liens YouTube nécessitent internet."},
    {q:'Email non reçu ?',a:'Vérifiez Spam. Contactez : elayachiauto@gmail.com'}
  ],
  finalT:"Commencez votre <em>parcours</em> aujourd'hui",finalS:'Votre plan personnalisé prêt en 3 minutes — envoyé instantanément',finalCta:'Obtenir mon plan →',
  float:'🔥 Mon plan santé',
  foot:'© 2025 AYACHI INFO • Tous droits réservés • elayachiauto@gmail.com',
  dzdLabel:'Dinar Algérien (DZD)',usdLabel:'Dollar Américain (USD)'
}
};

function L(l){
  curLang=l;
  document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.includes(l.toUpperCase())));
  renderAll();
}

function renderAll(){
  const t=T[curLang];
  document.documentElement.setAttribute('lang',t.lang);
  document.documentElement.setAttribute('dir',t.dir);

  document.getElementById('hBadge').textContent=t.badge;
  document.getElementById('hTitle').innerHTML=t.title;
  document.getElementById('hSub').textContent=t.sub;
  document.getElementById('hCta1').textContent=t.cta1;
  document.getElementById('hCta2').textContent=t.cta2;
  document.getElementById('hTrust').innerHTML=t.trust;
  document.getElementById('floatBtn').textContent=t.float;

  // Stats
  document.getElementById('statsBand').innerHTML=t.stats.map(s=>
    `<div class="sband-item"><div class="sband-num">${s.n}</div><div class="sband-lbl">${s.l}</div></div>`).join('');

  // Ath labels
  ['athL1','athL2','athL3'].forEach((id,i)=>document.getElementById(id).textContent=t.athL[i]);

  // How
  document.getElementById('howEye').textContent=t.howEye;
  document.getElementById('howTitle').innerHTML=t.howTitle;
  document.getElementById('howSub').textContent=t.howSub;
  document.getElementById('stepsEl').innerHTML=t.steps.map(s=>
    `<div class="step"><div class="step-num">${s.n}</div><div><div class="step-title">${s.t}</div><div class="step-desc">${s.d}</div></div></div>`).join('');

  // Features
  document.getElementById('featEye').textContent=t.featEye;
  document.getElementById('featTitle').innerHTML=t.featTitle;
  document.getElementById('featSub').textContent=t.featSub;
  document.getElementById('featGrid').innerHTML=t.feats.map(f=>
    `<div class="feat-card"><span class="feat-em">${f.e}</span><div class="feat-t">${f.t}</div><div class="feat-d">${f.d}</div></div>`).join('');

  // Results
  document.getElementById('resT').textContent=t.resT;
  document.getElementById('resS').textContent=t.resS;
  document.getElementById('baWrap').innerHTML=t.results.map(r=>`
    <div>
      <div class="ba-card">
        <div class="ba-side"><div class="ba-lbl">${t.bef}</div><div class="ba-val b">${r.b}</div></div>
        <div class="ba-arr">→</div>
        <div class="ba-side"><div class="ba-lbl">${t.aft}</div><div class="ba-val a">${r.a}</div></div>
      </div>
      <div class="ba-foot">${r.n}<span class="ba-tag">${r.tag}</span></div>
    </div>`).join('');

  // Trainers
  document.getElementById('trainEye').textContent=t.trainEye;
  document.getElementById('trainTitle').innerHTML=t.trainTitle;
  document.getElementById('trainSub').textContent=t.trainSub;
  t.trainers.forEach((tr,i)=>{
    document.getElementById('tr'+(i+1)+'n').textContent=tr.n;
    document.getElementById('tr'+(i+1)+'r').textContent=tr.r;
  });

  // Testimonials
  document.getElementById('testiEye').textContent=t.testiEye;
  document.getElementById('testiTitle').innerHTML=t.testiTitle;
  document.getElementById('testiList').innerHTML=t.testis.map(ts=>`
    <div class="testi-card">
      <div class="testi-head">
        <div class="testi-av"><img src="${ts.av}" alt="${ts.n}" loading="lazy"></div>
        <div><div class="stars">${ts.stars}</div><div class="testi-nm">${ts.n}</div><div class="testi-inf">${ts.i}</div></div>
      </div>
      <div class="testi-txt">${ts.text}</div>
    </div>`).join('');

  // Pricing
  document.getElementById('priceEye').textContent=t.priceEye;
  document.getElementById('priceTitle').innerHTML=t.priceTitle;
  document.getElementById('priceSub').textContent=t.priceSub;
  renderPricing();

  document.getElementById('guarT').textContent=t.guarT;
  document.getElementById('guarD').textContent=t.guarD;

  // FAQ
  document.getElementById('faqEye').textContent=t.faqEye;
  document.getElementById('faqTitle').innerHTML=t.faqTitle;
  document.getElementById('faqEl').innerHTML=t.faqs.map(f=>`
    <div class="faq-item" onclick="this.classList.toggle('open')">
      <div class="faq-q">${f.q}<span class="faq-ic">+</span></div>
      <div class="faq-a">${f.a}</div>
    </div>`).join('');

  // Final
  document.getElementById('finalT').innerHTML=t.finalT;
  document.getElementById('finalS').textContent=t.finalS;
  document.getElementById('finalCta').textContent=t.finalCta;
  document.getElementById('footCopy').textContent=t.foot;
}

function renderPricing(){
  const t=T[curLang];
  document.getElementById('pricingWrap').innerHTML=t.plans.map(p=>`
    <div class="price-card ${p.f?'feat':''}">
      ${p.hot?`<div class="price-hot">${p.hot}</div>`:''}
      <div class="price-name">${p.name}</div>
      <div class="price-desc">${p.desc}</div>
      <div class="price-val">
        <div class="price-num">${p.usd}</div>
        <div class="price-cur">$</div>
      </div>
      <div class="price-per">${p.per_usd}</div>
      <div style="font-size:.74rem;color:var(--sub);margin-bottom:14px;">💳 PayPal • Visa • Mastercard</div>
      <ul class="price-feats">${p.feats.map(f=>`<li><span class="ck">✓</span>${f}</li>`).join('')}</ul>
      <a href="${APP}?plan=${p.id}" class="price-btn ${p.f?'btn-sl':'btn-ol'}">${p.btn}</a>
    </div>`).join('');
}

// Init
const navLang=(navigator.language||'ar').slice(0,2);
if(T[navLang]) curLang=navLang;
if((navigator.language||'').startsWith('ar')) curLang='ar';
document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.includes(curLang.toUpperCase())));
renderAll();

// Scroll reveal
const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis');}),{threshold:.08});
document.querySelectorAll('.rv').forEach(el=>obs.observe(el));
</script>
</body>
</html>
